<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="CCSICTLOGOCROP.png">
    <title>Upload Announcement - CentraNounceIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="keys.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,tl',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        /* ── CSS Variables ── */
        :root {
            --bg:         #1a1a1a;
            --surface:    #2d2d2d;
            --card:       #3d3d3d;
            --border:     #3d3d3d;
            --text:       #ffffff;
            --text-muted: #a0a0a0;
            --accent:     #7ed321;
            --accent2:    #9FE870;
            --input-bg:   #1a1a1a;
            --shadow:     0 8px 32px rgba(0,0,0,0.4);
            --inset:      inset 0 2px 4px rgba(0,0,0,0.3);
        }
        body.light-mode {
            --bg:         #f5faf2;
            --surface:    #ffffff;
            --card:       #e8f5e0;
            --border:     #c9e5ba;
            --text:       #163300;
            --text-muted: #2d5514;
            --accent:     #7acc50;
            --accent2:    #9FE870;
            --input-bg:   #ffffff;
            --shadow:     0 8px 32px rgba(0,0,0,0.08);
            --inset:      inset 0 2px 4px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background-color .3s, color .3s;
        }

        /* ── Form inputs ── */
        .form-input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            box-shadow: var(--inset);
            transition: border-color .3s, background-color .3s;
            outline: none;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-input:read-only { color: var(--text-muted); cursor: not-allowed; }

        textarea.form-input { resize: vertical; }

        select.form-input { appearance: none; cursor: pointer; }

        /* ── Cards ── */
        .panel {
            background-color: var(--surface);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: background-color .3s;
        }

        /* ── Buttons ── */
        .btn-green {
            background-color: var(--accent);
            color: #1a1a1a;
            font-weight: 700;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: opacity .2s, transform .2s;
            box-shadow: 0 4px 12px rgba(126,211,33,0.3);
        }
        .btn-green:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        .btn-green:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-gray {
            background-color: var(--card);
            color: var(--text);
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: opacity .2s;
        }
        .btn-gray:hover { opacity: 0.85; }

        /* ── Progress bar ── */
        .progress-track {
            height: 12px; border-radius: 9999px; overflow: hidden;
            background-color: var(--card);
            box-shadow: var(--inset);
        }
        .progress-fill {
            height: 100%; width: 0%;
            background-color: var(--accent);
            border-radius: 9999px;
            transition: width .3s;
        }

        /* ── Status badges ── */
        .badge-error   { background:rgba(239,68,68,.1);  border:1px solid rgba(239,68,68,.3);  color:#ef4444; }
        .badge-success { background:rgba(126,211,33,.1); border:1px solid rgba(126,211,33,.3); color:var(--accent); }
        .badge-warning { background:rgba(251,191,36,.1); border:1px solid rgba(251,191,36,.3); color:#fbbf24; }

        /* ── Cropper ── */
        .cropper-modal { background-color: rgba(0,0,0,0.2) !important; }
        .cropper-crop-box { border: 3px solid var(--accent) !important; box-shadow: 0 0 0 9999px rgba(0,0,0,0.2) !important; }
        .cropper-view-box { outline: 3px solid var(--accent) !important; }

        /* ── Full-screen modals (crop / camera) ── */
        .overlay-modal {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(26,26,26,.95);
            display: none; align-items: center; justify-content: center;
        }
        body.light-mode .overlay-modal { background: rgba(240,250,235,.95); }
        .overlay-modal.open { display: flex; }
        .overlay-inner {
            background: var(--surface);
            border-radius: 12px;
            padding: 2rem;
            max-width: 90vw; max-height: 90vh;
            overflow: auto;
            box-shadow: var(--shadow);
        }

        /* ── Extracted text pre ── */
        .text-preview {
            background-color: var(--input-bg);
            color: var(--text-muted);
            border-radius: 8px;
            padding: 1rem;
            min-height: 520px;
            overflow: auto;
            font-size: 0.9rem;
            box-shadow: var(--inset);
            white-space: pre-wrap;
            word-break: break-all;
            transition: background-color .3s, color .3s;
        }

        /* ── Theme toggle ── */
        .theme-btn {
            background: none;
            border: 2px solid var(--border);
            color: var(--text);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1rem;
            transition: all .3s;
            flex-shrink: 0;
        }
        .theme-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(20deg); }

        /* ── Chatbot loading dots ── */
        .dot { animation: dotBounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes dotBounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
        [x-cloak] { display: none !important; }

        /* ── Google Translate banner suppression ── */
        .goog-te-banner-frame,
        .goog-te-banner-frame.skiptranslate,
        .skiptranslate > iframe,
        #goog-gt-tt,
        .goog-te-balloon-frame { display: none !important; visibility: hidden !important; height: 0 !important; }
        body { top: 0 !important; position: static !important; }
        body.translated-ltr, body.translated-rtl { top: 0 !important; margin-top: 0 !important; }
        .goog-te-gadget { font-family: 'Poppins', sans-serif !important; font-size: .85rem !important; line-height: 1 !important; }
        .goog-te-gadget-simple { background: transparent !important; border: none !important; padding: 4px !important; }
        .goog-te-gadget-simple .goog-te-menu-value,
        .goog-te-gadget-simple .goog-te-menu-value span,
        .goog-te-gadget-simple span { color: var(--text) !important; font-weight: 600 !important; }
        .goog-te-gadget-icon { display: none !important; }
        #google_translate_element select, .goog-te-combo {
            background-color: var(--card) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            padding: 6px 10px !important;
            font-weight: 600 !important;
            outline: none !important;
            cursor: pointer !important;
        }
        #google_translate_element select option, .goog-te-combo option {
            background-color: var(--card) !important;
            color: var(--text) !important;
        }
        .translate-dropdown {
            position: fixed; bottom: 90px; right: 30px;
            background: var(--surface);
            border: 2px solid var(--accent);
            border-radius: 12px; padding: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 998;
        }

        /* ── Section label ── */
        .field-label { display: block; margin-bottom: .5rem; font-weight: 600; font-size: .95rem; color: var(--accent); }

        /* ── Camera video ── */
        #cameraVideo { border: 2px solid var(--accent); border-radius: 8px; background: #000; max-height: 60vh; width: 100%; }
        #cropImage   { border: 2px solid var(--accent); border-radius: 8px; max-height: 70vh; width: 100%; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    </style>
</head>

<body class="p-4 sm:p-6">
<div class="max-w-7xl mx-auto">

    <!-- ── HEADER ── -->
    <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
        <a href="faculty_Dashboard.html"
           class="inline-flex items-center gap-2 text-lg font-semibold transition-opacity opacity-90 hover:opacity-100"
           style="color:var(--accent);">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        <h1 class="text-2xl sm:text-3xl font-bold text-center" style="color:var(--accent);">Upload Announcement</h1>
        <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
    </div>

    <!-- ── MAIN GRID ── -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- LEFT COLUMN -->
        <div class="space-y-6">

            <!-- Image upload panel -->
            <div class="panel">
                <label class="field-label text-lg mb-3" for="imageInput">Upload or Capture Image</label>
                <input type="file" id="imageInput" accept="image/*"
                    class="form-input mb-4 text-sm cursor-pointer">

                <div class="flex gap-3 mb-4">
                    <button id="captureBtn" class="btn-gray flex-1 flex items-center justify-center gap-2">
                        <i class="fas fa-camera"></i> Capture Photo
                    </button>
                </div>

                <div class="flex gap-3">
                    <button id="extractText" class="btn-green flex-1" disabled>
                        <i class="fas fa-magic mr-2"></i>Extract Text
                    </button>
                </div>

                <!-- Progress -->
                <div id="progressContainer" class="mt-4 hidden">
                    <div class="progress-track mb-2">
                        <div class="progress-fill" id="progressBar"></div>
                    </div>
                    <div class="font-semibold text-sm text-center" id="progressText" style="color:var(--accent);">Starting OCR...</div>
                </div>
            </div>

            <!-- Extracted text preview -->
            <div class="panel" style="min-height:640px;">
                <div class="font-bold mb-3 text-xl" style="color:var(--accent);">Extracted Text Preview</div>
                <pre id="extractedTextPreview" class="text-preview">No text extracted yet</pre>
            </div>
        </div>

        <!-- RIGHT COLUMN: form -->
        <div>
            <form id="announcementForm" class="panel space-y-5" style="min-height:800px;">
                <div class="text-2xl font-bold mb-2" style="color:var(--accent);">Announcement Details</div>

                <!-- Title -->
                <div>
                    <label class="field-label" for="fieldTitle">Title *</label>
                    <input id="fieldTitle" class="form-input" placeholder="Main title of the announcement" autocomplete="off" required>
                </div>

                <!-- Category + Audience -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="field-label" for="category">Category *</label>
                        <select id="category" class="form-input" required>
                            <option value="">Select Category</option>
                            <option value="Emergency">Emergency</option>
                            <option value="Memo">Memo</option>
                            <option value="Notices">Notices</option>
                            <option value="Deadline">Deadline</option>
                        </select>
                    </div>
                    <div>
                        <label class="field-label" for="targetAudience">Target Audience *</label>
                        <select id="targetAudience" class="form-input" required>
                            <option value="">Select Target Audience</option>
                            <option value="all">All</option>
                            <option value="faculty">Faculty Only</option>
                            <option value="students">Students Only</option>
                        </select>
                    </div>
                </div>

                <!-- Full Description -->
                <div>
                    <label class="field-label" for="fieldWhat">What (Full Description)</label>
                    <textarea id="fieldWhat" class="form-input" style="height:180px;"
                        placeholder="Complete announcement content"></textarea>
                </div>

                <!-- Summary -->
                <div>
                    <label class="field-label" for="fieldSummary">Summary (Brief Overview)</label>
                    <textarea id="fieldSummary" class="form-input" style="height:120px;"
                        placeholder="Auto-generated concise summary"></textarea>
                </div>

                <!-- When + Where -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="field-label" for="fieldWhen">When (Scheduled Date)</label>
                        <input id="fieldWhen" type="date" class="form-input">
                    </div>
                    <div>
                        <label class="field-label" for="fieldWhere">Where (Location)</label>
                        <input id="fieldWhere" class="form-input" placeholder="Event location or venue" autocomplete="off">
                    </div>
                </div>

                <!-- Why -->
                <div>
                    <label class="field-label" for="fieldWhy">Why (Purpose)</label>
                    <textarea id="fieldWhy" class="form-input" style="height:140px;"
                        placeholder="Purpose or reason for the event"></textarea>
                </div>

                <!-- Date Posted (readonly) -->
                <div>
                    <label class="field-label" for="fieldDatePosted">Date Posted</label>
                    <input id="fieldDatePosted" class="form-input" readonly>
                </div>

                <!-- Status message -->
                <div id="statusMsg" class="text-sm font-semibold text-center p-4 rounded hidden"></div>

                <!-- Submit -->
                <button type="submit" id="saveButton" class="btn-green w-full text-base">
                    <i class="fas fa-save mr-2"></i>Save Announcement
                </button>
            </form>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════
     CAMERA MODAL
══════════════════════════════════════ -->
<div id="cameraModal" class="overlay-modal">
    <div class="overlay-inner w-full" style="max-width:680px;">
        <h2 class="text-2xl font-bold mb-4" style="color:var(--accent);">Capture Announcement Photo</h2>
        <div class="mb-4">
            <video id="cameraVideo" autoplay playsinline></video>
            <canvas id="cameraCanvas" class="hidden"></canvas>
        </div>
        <div class="flex gap-3 justify-end">
            <button id="cancelCameraBtn" class="btn-gray">Cancel</button>
            <button id="capturePhotoBtn" class="btn-green flex items-center gap-2">
                <i class="fas fa-camera"></i> Take Photo
            </button>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════
     CROP MODAL
══════════════════════════════════════ -->
<div id="cropModal" class="overlay-modal">
    <div class="overlay-inner w-full" style="max-width:800px;">
        <h2 class="text-2xl font-bold mb-4" style="color:var(--accent);">Crop Your Image</h2>
        <div class="mb-4">
            <img id="cropImage">
        </div>
        <div class="flex gap-3 justify-end">
            <button id="cancelCropBtn" class="btn-gray">Cancel</button>
            <button id="cropBtn" class="btn-green">Crop &amp; Use Image</button>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════
     CHATBOT (Alpine.js) — bottom-[160px] right-[30px]
══════════════════════════════════════ -->
<div x-data="initChatbot()" x-cloak>
    <button @click="isOpen = !isOpen"
        class="fixed bottom-[160px] right-[30px] w-[50px] h-[50px] rounded-full flex items-center justify-center text-black cursor-pointer z-[999] border-2 text-xl transition-all duration-300 hover:scale-110 active:scale-95"
        style="background:linear-gradient(135deg,#9FE870,#8AD95E); border-color:#9FE870; box-shadow:0 4px 12px rgba(159,232,112,0.4);"
        aria-label="Toggle chatbot">
        <i x-show="!isOpen" class="fa-solid fa-robot"></i>
        <i x-show="isOpen"  class="fa-solid fa-xmark"></i>
    </button>

    <div x-show="isOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-90 translate-y-5"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 scale-90 translate-y-5"
         class="fixed bottom-[220px] right-[30px] w-[90vw] max-w-[400px] max-h-[calc(100vh-240px)] min-h-[300px] rounded-3xl border flex flex-col overflow-hidden z-[998] transition-colors duration-300"
         style="background:var(--bg); border-color:var(--border); box-shadow:0 20px 60px rgba(0,0,0,0.5);">

        <!-- Header -->
        <div class="px-4 py-3 border-b flex items-center justify-between gap-3"
             style="background:var(--surface); border-color:var(--border);">
            <div>
                <h2 class="font-bold text-sm tracking-wide" style="color:var(--text);">Chatbot</h2>
                <p class="text-[11px] font-medium" style="color:var(--accent);">Your Campus Assistant</p>
            </div>
            <button @click="isOpen = false" class="hover:opacity-70 transition-colors w-6 h-6 flex items-center justify-center" style="color:var(--text-muted);">
                <i class="fa-solid fa-minus text-sm"></i>
            </button>
        </div>

        <!-- Messages -->
        <div id="chatbot-messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3" style="background:var(--bg);">
            <template x-for="(msg, index) in messages" :key="index">
                <div :style="msg.role === 'user'
                    ? 'background:linear-gradient(135deg,#9FE870,#8AD95E);color:#000;border:1px solid #9FE870;border-radius:16px 16px 4px 16px;margin-left:auto;max-width:85%;padding:12px;font-size:.875rem;line-height:1.5;'
                    : 'background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:16px 16px 16px 4px;margin-right:auto;max-width:85%;padding:12px;font-size:.875rem;line-height:1.5;'">
                    <p class="whitespace-pre-wrap" x-text="msg.content"></p>
                </div>
            </template>
            <div x-show="isLoading" class="flex gap-1 p-3 border self-start"
                 style="border-radius:16px 16px 16px 4px; background:var(--surface); border-color:var(--border);">
                <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
                <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
                <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="p-4 border-t" style="background:var(--surface); border-color:var(--border);">
            <form @submit.prevent="sendMessage()" class="flex gap-2 items-center">
                <input type="text" x-model="userInput" placeholder="Ask a question..."
                    class="flex-1 px-4 py-2.5 rounded-xl border text-[0.875rem] outline-none transition-all duration-300"
                    style="background:var(--card); border-color:var(--border); color:var(--text);"
                    onfocus="this.style.borderColor='var(--accent)';"
                    onblur="this.style.borderColor='var(--border)';">
                <button type="submit" :disabled="!userInput.trim() || isLoading"
                    class="w-10 h-10 rounded-xl flex items-center justify-center border-none cursor-pointer transition-all hover:scale-105 disabled:opacity-50"
                    style="background:linear-gradient(135deg,#9FE870,#8AD95E); color:#000; box-shadow:0 4px 12px rgba(159,232,112,0.3);">
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════
     TRANSLATE BUTTON
══════════════════════════════════════ -->
<button id="translate-toggle-btn"
    class="notranslate fixed bottom-[30px] right-[30px] z-[999] w-[50px] h-[50px] rounded-full flex items-center justify-center cursor-pointer text-xl text-black"
    style="background:var(--accent); border:2px solid var(--accent); box-shadow:0 4px 12px rgba(159,232,112,0.4); transition:all .3s;"
    translate="no" aria-label="Toggle translation">
    <i class="fas fa-language"></i>
</button>
<div id="google_translate_element" class="notranslate translate-dropdown" translate="no" style="display:none;"></div>

<!-- ══════════════════════════════════════
     SCRIPTS
══════════════════════════════════════ -->
<script>
    // ── EmailJS init from keys.js ──
    (function() { emailjs.init(window.API_KEYS?.EMAILJS_PUBLIC_KEY_UPLOAD || ''); })();

    // ── Config — all keys from keys.js ──
    const CONFIG = {
        SUPABASE_URL:        window.API_KEYS?.SUPABASE_URL || '',
        SUPABASE_KEY:        window.API_KEYS?.SUPABASE_ANON_KEY || '',
        GROQ_MODEL:          'llama-3.1-8b-instant',
        MAX_RETRIES:         3,
        RETRY_DELAY:         2000,
        REQUEST_TIMEOUT:     30000,
        MIN_OCR_TEXT_LENGTH: 10
    };

    const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

    // ── State ──
    let cropper = null;
    let currentImageBlob = null;
    let currentUserProfile = null;
    let cameraStream = null;

    // ── DOM ──
    const imageInput          = document.getElementById('imageInput');
    const cropImage           = document.getElementById('cropImage');
    const cropBtn             = document.getElementById('cropBtn');
    const extractTextBtn      = document.getElementById('extractText');
    const extractedTextPreview= document.getElementById('extractedTextPreview');
    const progressContainer   = document.getElementById('progressContainer');
    const progressBar         = document.getElementById('progressBar');
    const progressText        = document.getElementById('progressText');
    const statusMsg           = document.getElementById('statusMsg');
    const captureBtn          = document.getElementById('captureBtn');
    const cameraModal         = document.getElementById('cameraModal');

    class GroqAPIError extends Error { constructor(m,s=null,o=null){super(m);this.name='GroqAPIError';this.statusCode=s;this.originalError=o;} }

    // ══════════════════════════════════════
    // THEME
    // ══════════════════════════════════════
    function initTheme() {
        const saved = localStorage.getItem('uploadTheme') || 'dark';

    function applyTheme(theme) {
        const icon = document.getElementById('themeIcon');
        if (theme === 'light') {
            document.body.classList.add('light-mode');
            if (icon) { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
        } else {
            document.body.classList.remove('light-mode');
            if (icon) { icon.classList.remove('fa-sun'); icon.classList.add('fa-moon'); }
        }
    }
    function toggleTheme() {
        const isLight = document.body.classList.contains('light-mode');
        const next = isLight ? 'dark' : 'light';
        localStorage.setItem('uploadTheme', next);
        applyTheme(next);
        setTimeout(applyTranslateColors, 50);
    }
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    // ══════════════════════════════════════
    // UTILITIES
    // ══════════════════════════════════════
    function showStatus(message, type = 'info') {
        statusMsg.textContent = message;
        statusMsg.className = 'text-sm font-semibold text-center p-4 rounded';
        if (type === 'error')   statusMsg.classList.add('badge-error');
        else if (type === 'success') statusMsg.classList.add('badge-success');
        else if (type === 'warning') statusMsg.classList.add('badge-warning');
        else statusMsg.classList.add('badge-success');
        statusMsg.classList.remove('hidden');
    }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function getBackoffDelay(attempt) { return Math.min(CONFIG.RETRY_DELAY * Math.pow(2, attempt), 10000); }
    function getTodayDate() {
        const t = new Date();
        return `${t.getFullYear()}-${(t.getMonth()+1).toString().padStart(2,'0')}-${t.getDate().toString().padStart(2,'0')}`;
    }
    function sanitizeForJSON(str) {
        if (!str) return '';
        return str.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,' ').replace(/\r/g,' ').replace(/\t/g,' ').trim();
    }
    function validateExtractedFields(fields) {
        const errors = [];
        const validAudiences = ['all','faculty','students'];
        if (fields.target_audience && !validAudiences.includes(fields.target_audience)) { errors.push(`Invalid target_audience`); fields.target_audience = 'all'; }
        const validCategories = ['Emergency','Memo','Notices','Deadline'];
        if (fields.category && !validCategories.includes(fields.category)) { errors.push(`Invalid category`); fields.category = 'Notices'; }
        if (fields.when && fields.when !== '' && !/^\d{4}-\d{2}-\d{2}$/.test(fields.when)) { errors.push(`Invalid date format`); fields.when = ''; }
        if (fields.title && fields.title.length > 100) { fields.title = fields.title.substring(0,100); }
        return { isValid: errors.length === 0, errors, fields };
    }

    captureBtn.addEventListener('click', async () => {

    // OCR
    // ══════════════════════════════════════
    extractTextBtn.addEventListener('click', async () => {
        if (!currentImageBlob) { showStatus('⚠ Please crop and confirm the image first.', 'warning'); return; }
        statusMsg.classList.add('hidden');
        progressBar.style.width = '0%';
        progressContainer.classList.remove('hidden');
        extractTextBtn.disabled = true;
        extractTextBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Recognizing...';
        try {
            const ocrText = await performOCR(currentImageBlob);
            if (!ocrText || ocrText.length < CONFIG.MIN_OCR_TEXT_LENGTH) throw new OCRError('Insufficient text extracted. Please try a clearer image.');
            extractedTextPreview.textContent = ocrText;
            showStatus('⏳ Extracting structured data with AI...', 'info');
            const fields = await extractFieldsWithRetry(ocrText);
            const validation = validateExtractedFields(fields);
            if (!validation.isValid) showStatus(`⚠ Fields extracted with ${validation.errors.length} warning(s). Please review.`, 'warning');
            else showStatus('✅ All fields extracted successfully!', 'success');
            populateFormFields(validation.fields);
        } catch (error) {
            handleExtractionError(error);
        } finally {
            extractTextBtn.disabled = false;
            extractTextBtn.innerHTML = '<i class="fas fa-magic mr-2"></i>Extract Text';
            progressContainer.classList.add('hidden');
        }
    });

    async function performOCR(imageBlob) {
        const result = await Tesseract.recognize(imageBlob, 'eng', {
            logger: m => {
                if (m.status === 'recognizing text') {
                    const p = Math.round(m.progress * 100);
                    progressBar.style.width = p + '%';
                    progressText.textContent = `OCR ${p}%`;
                }
            }
        });
        return result.data.text.trim();
    }

    async function extractFieldsWithRetry(ocrText) {
        let lastError = null;
        for (let attempt = 0; attempt < CONFIG.MAX_RETRIES; attempt++) {
            try {
                const fields = await extractSmartFieldsWithGroq(ocrText);
                if (!fields || typeof fields !== 'object') throw new GroqAPIError('Invalid response format');
                return fields;
            } catch (error) {
                lastError = error;
                if (error instanceof ValidationError) throw error;
                if (attempt < CONFIG.MAX_RETRIES - 1) {
                    const delay = getBackoffDelay(attempt);
                    showStatus(`Attempt ${attempt+1} failed. Retrying...`, 'warning');
                    await sleep(delay);
                }
            }
        }
        throw new GroqAPIError(`Failed after ${CONFIG.MAX_RETRIES} attempts: ${lastError.message}`, null, lastError);
    }

    async function extractSmartFieldsWithGroq(ocrText) {
        const prompt = `# TASK: Extract structured data from OCR announcement text

**INPUT TEXT:**
"""
${sanitizeForJSON(ocrText)}
"""

**ANCHOR DATE:** November 9, 2025

## EXTRACTION RULES

### 1. TITLE (5-10 words)
Extract headline or synthesize from main topic. Never empty.

### 2. WHAT (100% VERBATIM - MOST CRITICAL)
**COPY THE ENTIRE ANNOUNCEMENT TEXT EXACTLY AS IT APPEARS**
- Include EVERY SINGLE SENTENCE from the original text
- Only fix obvious OCR character errors: l→I, 0→O, rn→m
- DO NOT rephrase, summarize, condense, or skip ANY content
- Replace newlines with single spaces but preserve ALL text

### 3. SUMMARY (NEW - 2-3 sentences)
Create a CONCISE SUMMARY of the announcement.
- 2-3 sentences maximum (40-60 words)

### 4. WHEN (YYYY-MM-DD or "")
Parse dates. Return "" if no date found.

### 5. WHERE
Complete location. Return "" if none.

### 6. WHY
Purpose in 1-2 sentences.

### 7. TARGET_AUDIENCE (enum)
"all" | "students" | "faculty"

### 8. CATEGORY (enum)
Emergency > Deadline > Memo > Notices

## OUTPUT JSON (no markdown):
{
  "title": "string",
  "what": "COMPLETE VERBATIM text",
  "summary": "2-3 sentence summary",
  "when": "YYYY-MM-DD or empty",
  "where": "string or empty",
  "why": "string",
  "target_audience": "all|faculty|students",
  "category": "Emergency|Memo|Notices|Deadline"
}`;

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), CONFIG.REQUEST_TIMEOUT);
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${window.API_KEYS?.GROQ_API_KEY || ''}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: CONFIG.GROQ_MODEL,
                    messages: [
                        { role: "system", content: "You are an NLP extraction specialist. Return ONLY valid JSON." },
                        { role: "user", content: prompt }
                    ],
                    temperature: 0.05, max_tokens: 2000,
                    response_format: { type: "json_object" }
                }),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if (!response.ok) throw new GroqAPIError(`API request failed: ${response.statusText}`, response.status);
            const data = await response.json();
            if (data.error) throw new GroqAPIError(`API error: ${data.error.message}`);
            if (!data.choices?.length) throw new GroqAPIError('No response from API');
            let content = data.choices[0].message.content.trim().replace(/``````\n?/g,'');
            const match = content.match(/\{[\s\S]*\}/);
            if (match) content = match[0];
            const parsed = JSON.parse(content);
            ['title','what','summary','when','where','why','target_audience','category'].forEach(f => { if (!(f in parsed)) parsed[f] = ''; });
            return parsed;
        } catch (error) {
            if (error.name === 'AbortError') throw new GroqAPIError('Request timeout', 408);
            if (error instanceof GroqAPIError) throw error;
            if (error instanceof SyntaxError) throw new GroqAPIError('Invalid JSON response', null, error);
            throw new GroqAPIError('Unexpected error', null, error);
        } finally { clearTimeout(timeoutId); }
    }

    function populateFormFields(fields) {
        fieldTitle.value         = fields.title || '';
        fieldCategory.value      = fields.category || '';
        fieldTargetAudience.value= fields.target_audience || '';
        fieldWhat.value          = fields.what || '';
        fieldSummary.value       = fields.summary || '';
        fieldWhen.value          = fields.when || '';
        fieldWhere.value         = fields.where || '';
        fieldWhy.value           = fields.why || '';
        fieldDatePosted.value    = getTodayDate();
    }

    function handleExtractionError(error) {
        if (error instanceof OCRError)        showStatus(`OCR Error: ${error.message}`, 'error');
        else if (error instanceof GroqAPIError) showStatus(`AI Error: ${error.message}`, 'error');
        else if (error instanceof ValidationError) showStatus(`Validation Error: ${error.message}`, 'error');
        else showStatus(`Unexpected error: ${error.message}`, 'error');
    }

    announcementForm.addEventListener('submit', async (e) => { e.preventDefault(); await saveAnnouncement(); });

    async function saveAnnouncement() {
        try {
            if (!currentUserProfile) throw new ValidationError('User profile not loaded. Please refresh.');
            const announcementData = {
                title:           fieldTitle.value.trim(),
                category:        fieldCategory.value,
                target_audience: fieldTargetAudience.value,
                description:     fieldWhat.value.trim() || null,
                summary:         fieldSummary.value.trim() || null,
                scheduled_date:  fieldWhen.value || null,
                location:        fieldWhere.value.trim() || null,
                why:             fieldWhy.value.trim() || null,
                posted_at:       getTodayDate(),
                posted_by:       currentUserProfile.full_name || 'Unknown User',
                posted_by_user_id: currentUserProfile.id
            };
            if (!announcementData.title)           throw new ValidationError('Title is required', 'title');
            if (!announcementData.category)        throw new ValidationError('Category is required', 'category');
            if (!announcementData.target_audience) throw new ValidationError('Target Audience is required', 'targetAudience');

            saveButton.disabled = true;
            saveButton.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Saving & Sending Emails...';
            showStatus('⏳ Saving announcement and triggering emails...', 'info');

            const { error } = await supabaseClient.from('announcementstest').insert([announcementData]);
            if (error) throw error;

            let query = supabaseClient.from('notifications').select('fullname,email,user_type').eq('archived', false);
            if (announcementData.target_audience !== 'all') query = query.eq('user_type', announcementData.target_audience);
            const { data: usersData, error: fetchError } = await query;

            if (fetchError) {
                showStatus("⚠ Announcement saved, but couldn't fetch users to email.", 'warning');
            } else if (usersData?.length > 0) {
                await Promise.all(usersData.map(user =>
                    emailjs.send(window.API_KEYS?.EMAILJS_SERVICE_ID_UPLOAD || '', window.API_KEYS?.EMAILJS_TEMPLATE_ID_UPLOAD || '', {
                        to_name:              user.fullname,
                        to_email:             user.email,
                        announcement_title:   announcementData.title,
                        announcement_category:announcementData.category,
                        announcement_content: announcementData.description || 'See announcement dashboard for details.',
                        scheduled_date:       announcementData.scheduled_date || 'TBA'
                    }).catch(err => console.error(`Failed to send to ${user.email}`, err))
                ));
                showStatus('✅ Announcement saved and emails sent!', 'success');
            } else {
                showStatus('✅ Announcement saved! (No active users to email)', 'success');
            }

            announcementForm.reset();
            fieldDatePosted.value = getTodayDate();
            extractedTextPreview.textContent = 'No text extracted yet';
            imageInput.value = '';
            currentImageBlob = null;

        } catch (error) {
            if (error instanceof ValidationError) {
                showStatus(`Validation Error: ${error.message}`, 'error');
                if (error.field) { const f = document.getElementById(`field${error.field.charAt(0).toUpperCase()+error.field.slice(1)}`); if(f) f.focus(); }
            } else {
                showStatus(`Save Error: ${error.message}`, 'error');
            }
        } finally {
            saveButton.disabled = false;
            saveButton.innerHTML = '<i class="fas fa-save mr-2"></i>Save Announcement';
        }
    }

    // ════════════════════════════════════════
    // CHATBOT — Alpine.js x-data (Upload Page)
    // ════════════════════════════════════════
    function initChatbot() {
        return {
            isOpen: false,
            userInput: '',
            isLoading: false,
            sessionId: 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2,9),
            messages: [{ role:'assistant', content:"Hi! I'm your campus assistant. I can help with formatting announcements, OCR text extraction, and platform rules. What do you need help with?" }],

            async sendMessage() {
                if (!this.userInput.trim()) return;
                this.messages.push({ role:'user', content:this.userInput });
                const input = this.userInput;
                this.userInput = '';
                this.isLoading = true;
                this.scrollToBottom();

                let replyAppended = false;
                try {
                    // Read live form field values as context
                    const formContext = [
                        `Title: ${document.getElementById('fieldTitle')?.value || 'empty'}`,
                        `Category: ${document.getElementById('fieldCategory')?.value || 'empty'}`,
                        `Audience: ${document.getElementById('fieldTargetAudience')?.value || 'empty'}`
                    ].join('\n');

                    const sysMsg = {
                        role: 'system',
                        content: `You are the CentraNounceIT Hub Assistant helping faculty staff upload and manage announcements.
You can help with: how to use the OCR feature, how to fill out announcement fields, and general campus communication questions.
Current form data they are typing:\n${formContext}\nBe concise, helpful, and professional.`
                    };

                    const msgs    = [sysMsg, ...this.messages.map(m=>({ role:m.role, content:m.content }))];
                    const models  = ['llama-3.3-70b-versatile','llama-3.1-8b-instant','mixtral-8x7b-32768'];
                    let response  = null, lastError = '';

                    // 7-Key Rotation Loop
                    for (let keyAttempt = 0; keyAttempt < 7; keyAttempt++) {
                        const apiKey = window.API_HELPERS.getGroqKey();
                        
                        for (const model of models) {
                            try {
                                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                                    method: 'POST',
                                    headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
                                    body: JSON.stringify({ model, messages:msgs, temperature:0.7, max_tokens:1024 })
                                });
                                if (res.ok) { response=res; break; }
                                lastError = await res.text();
                                if (res.status !== 429 && res.status !== 413) break;
                            } catch(fe) { lastError = fe.message; }
                        }
                        
                        if (response) break; // Success!
                        
                        if (lastError.includes('429') || lastError.includes('rate limit')) {
                            window.API_HELPERS.rotateGroqKey();
                        } else { break; }
                    }

                    if (!response) {
                        const wm = lastError.match(/try again in (\d+m[\d.]+s|\d+s)/i);
                        throw new Error(wm ? `RATE_LIMITED:${wm[1]}` : `API_FAILED:${lastError}`);
                    }

                    const data  = await response.json();
                    const reply = data.choices[0].message.content;
                    this.messages.push({ role:'assistant', content:reply });
                    replyAppended = true;

                    supabaseClient.from('chat_history').insert([{session_id: this.sessionId, user_message: input, assistant_response: reply, has_security_concern: false, created_at: new Date().toISOString()}]).then(()=>{});

                } catch(err) {
                    if (!replyAppended) {
                        let msg = 'Sorry, I encountered an error. Please try again.';
                        if (err.message?.startsWith('RATE_LIMITED:')) msg = `⏳ Rate limited. Please try again in ${err.message.replace('RATE_LIMITED:','')}`;
                        this.messages.push({ role:'assistant', content:msg });
                    }
                } finally {
                    this.isLoading = false;
                    this.scrollToBottom();
                }
            },
            scrollToBottom() { this.$nextTick(() => { const c = document.getElementById('chatbot-messages-container'); if (c) c.scrollTop = c.scrollHeight; }); }
        };
    }

    function getThemeColors() {
        const isLight = document.body.classList.contains('light-mode');
        return {
            text:   isLight ? '#163300' : '#ffffff',
            bg:     isLight ? '#e8f5e0' : '#3d3d3d',
            border: isLight ? '#c9e5ba' : '#3d3d3d',
        };
    }

    function applyTranslateColors() {
        const dropdown = document.getElementById('google_translate_element');
        if (!dropdown) return;
        const { text, bg, border } = getThemeColors();
        const combo = dropdown.querySelector('.goog-te-combo, select');
        if (combo) {
            combo.style.setProperty('color', text, 'important');
            combo.style.setProperty('background-color', bg, 'important');
            combo.style.setProperty('border', `1px solid ${border}`, 'important');
            combo.style.setProperty('border-radius', '8px', 'important');
            combo.style.setProperty('padding', '6px 10px', 'important');
            combo.style.setProperty('font-weight', '600', 'important');
            combo.style.setProperty('font-family', 'Poppins, sans-serif', 'important');
            combo.style.setProperty('font-size', '0.85rem', 'important');
            combo.style.setProperty('outline', 'none', 'important');
            combo.style.setProperty('cursor', 'pointer', 'important');
            combo.querySelectorAll('option').forEach(opt => {
                opt.style.setProperty('color', text, 'important');
                opt.style.setProperty('background-color', bg, 'important');
            });
        }
        dropdown.querySelectorAll('span,a,.goog-te-menu-value,.goog-te-menu-value span').forEach(el => {
            el.style.setProperty('color', text, 'important');
        });
    }

    function initTranslationToggle() {
        const btn      = document.getElementById('translate-toggle-btn');
        const dropdown = document.getElementById('google_translate_element');
        if (!btn || !dropdown) return;

        btn.addEventListener('click', e => {
            e.stopPropagation();
            const isVisible = dropdown.style.display === 'block';
            dropdown.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) applyTranslateColors();
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('#translate-toggle-btn') && !e.target.closest('#google_translate_element')) {
                dropdown.style.display = 'none';
            }
        });

        document.getElementById('themeToggle').addEventListener('click', () => setTimeout(applyTranslateColors, 50));

        const observer = new MutationObserver(applyTranslateColors);
        observer.observe(dropdown, { childList:true, subtree:true, attributes:true, attributeFilter:['style'] });

        let tries = 0;
        const poll = setInterval(() => { applyTranslateColors(); if (++tries >= 20) clearInterval(poll); }, 500);

        // Suppress the Google Translate top banner
        suppressTranslateBanner();
    }

    function suppressTranslateBanner() {
        function hideBanner() {
            document.querySelectorAll('.goog-te-banner-frame, .skiptranslate > iframe, #goog-gt-tt, .goog-te-balloon-frame').forEach(el => {
                el.style.setProperty('display', 'none', 'important');
                el.style.setProperty('height', '0', 'important');
                el.style.setProperty('visibility', 'hidden', 'important');
            });
            if (document.body.style.top && document.body.style.top !== '0px') {
                document.body.style.setProperty('top', '0', 'important');
                document.body.style.setProperty('margin-top', '0', 'important');
            }
        }
        new MutationObserver(hideBanner).observe(document.body, { attributes: true, attributeFilter: ['style', 'class'], childList: true });
        new MutationObserver(hideBanner).observe(document.head, { childList: true });
        hideBanner();
    }

    // ── Global error handlers ──
    window.addEventListener('unhandledrejection', e => { console.error('Unhandled rejection:', e.reason); });
    window.addEventListener('error', e => { console.error('Global error:', e.error); });
</script>
