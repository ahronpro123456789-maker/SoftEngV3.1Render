<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="CCSICTLOGOCROP.png">
    <title>Notify Me - CentraNounceIT</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Keys (must come before Alpine) -->
    <script src="UI.js"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Google Translate -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,tl',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'wise-green':       '#9FE870',
                        'wise-green-hover': '#7acc50',
                        'wise-dark':        '#0f0f0f',
                        'wise-gray':        '#1a1a1a',
                        'wise-light-gray':  '#b8d6a0',
                        'wise-border':      '#2d5514',
                    }
                }
            }
        }
    </script>

    <style>
        /* ── CSS Variables ── */
        :root {
            --bg:           #f5faf2;
            --surface:      #ffffff;
            --card:         #e8f5e0;
            --border:       #c9e5ba;
            --text:         #163300;
            --text-muted:   #2d5514;
            --text-faint:   #2d5514;
            --accent:       #7acc50;
            --accent-hi:    #9FE870;
            --shadow-green: rgba(122,204,80,0.2);
        }
        body.dark {
            --bg:           #000000;
            --surface:      #0f0f0f;
            --card:         #1a1a1a;
            --border:       #2d5514;
            --text:         #ffffff;
            --text-muted:   #b8d6a0;
            --text-faint:   #b8d6a0;
            --accent:       #9FE870;
            --accent-hi:    #9FE870;
            --shadow-green: rgba(159,232,112,0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ── Slide-in animation ── */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-slideIn { animation: slideIn 0.5s ease-out; }

        /* ── Option button active states ── */
        body.dark .option-btn.active {
            background: linear-gradient(135deg, #9FE870 0%, #7acc50 100%);
            border-color: #9FE870;
            color: #000;
        }
        body:not(.dark) .option-btn.active {
            background: linear-gradient(135deg, #7acc50 0%, #9FE870 100%);
            border-color: #7acc50;
            color: #000;
        }

        /* ── Form field transitions ── */
        .form-group {
            margin-bottom: 20px;
            opacity: 1;
            max-height: 200px;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .form-group.collapsed {
            opacity: 0;
            max-height: 0;
            margin-bottom: 0;
            pointer-events: none;
        }

        /* ── Input error state ── */
        input.input-error { border-color: #ff4444 !important; }

        /* ── Google Translate banner suppression ── */
        .goog-te-banner-frame,
        .goog-te-banner-frame.skiptranslate,
        .skiptranslate > iframe,
        #goog-gt-tt,
        .goog-te-balloon-frame { display:none !important; visibility:hidden !important; height:0 !important; }
        body { top:0 !important; position:static !important; }
        body.translated-ltr, body.translated-rtl { top:0 !important; margin-top:0 !important; }

        /* ── Google Translate widget styling ── */
        .goog-te-gadget { font-family:'Inter',sans-serif !important; font-size:0.85rem !important; }
        .goog-te-gadget-simple {
            background-color:var(--card) !important; border:1px solid var(--border) !important;
            border-radius:8px !important; padding:6px 10px !important;
        }
        .goog-te-gadget-simple .goog-te-menu-value,
        .goog-te-gadget-simple .goog-te-menu-value span,
        .goog-te-gadget-simple span,
        .goog-te-gadget-simple a { color:var(--text) !important; font-weight:600 !important; background:none !important; }
        .goog-te-gadget-icon { display:none !important; }
        #google_translate_element select, .goog-te-combo {
            background-color:var(--card) !important; color:var(--text) !important;
            border:1px solid var(--border) !important; border-radius:8px !important;
            padding:6px 10px !important; font-family:'Inter',sans-serif !important;
            font-size:0.85rem !important; font-weight:600 !important;
            outline:none !important; cursor:pointer !important;
        }
        #google_translate_element select option, .goog-te-combo option {
            background-color:var(--card) !important; color:var(--text) !important;
        }

        /* ── Translate dropdown ── */
        .translate-dropdown {
            position: fixed;
            bottom: 90px;
            right: 30px;
            background: var(--surface);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 998;
        }

        /* ── Chatbot loading dots ── */
        .dot { animation: dotBounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40%            { transform: scale(1); }
        }

        [x-cloak] { display: none !important; }

        /* ── Main card ── */
        .main-card {
            background: var(--surface);
            border: 1px solid var(--border);
        }

        /* ── Header btn ── */
        .header-btn {
            background: var(--surface);
            color: var(--text-muted);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .header-btn:hover {
            background: var(--card);
            color: var(--text);
            border-color: var(--accent);
        }

        /* ── Option button base ── */
        .option-btn {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text-muted);
            transition: all 0.3s;
            cursor: pointer;
        }
        .option-btn:hover {
            background: var(--border);
            border-color: var(--accent);
            color: var(--text);
        }

        /* ── Form input base ── */
        .form-input {
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            transition: all 0.3s;
        }
        .form-input::placeholder { color: var(--text-muted); opacity: 0.7; }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--shadow-green);
            background: var(--surface);
        }

        /* ── Form label ── */
        .form-label { color: var(--text-muted); }

        /* ── Success / Error banners ── */
        .success-banner {
            background: linear-gradient(135deg, #9FE870, #7acc50);
            color: #000;
        }
        .error-banner {
            background: #ff4444;
            color: #fff;
        }
    </style>
</head>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- Alpine root: notifyApp() wraps the entire page             -->
<!-- ═══════════════════════════════════════════════════════════ -->
<body
    class="min-h-screen flex justify-center items-center p-5 transition-colors duration-300"
    x-data="notifyApp()"
    x-init="initPage()"
>

    <!-- ── MAIN FORM CARD ── -->
    <div class="main-card rounded-2xl w-full max-w-[500px] p-8 animate-slideIn shadow-2xl">

        <!-- Header row -->
        <div class="flex items-center justify-between mb-6">
            <a href="teststartuppage.html"
               class="header-btn inline-flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-semibold">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Go back
            </a>

            <button @click="toggleTheme()"
                    class="header-btn px-3 py-2 rounded-xl text-sm font-semibold notranslate"
                    translate="no">
                <i :class="isDark ? 'fas fa-moon' : 'fas fa-sun'"></i>
            </button>
        </div>

        <!-- Title -->
        <h1 class="text-center text-2xl sm:text-[32px] font-bold mb-2.5" style="color:var(--accent);">
            📬 Notify Me
        </h1>
        <p class="text-center text-sm mb-8" style="color:var(--text-muted);">
            Stay updated with our latest notifications
        </p>

        <!-- Form -->
        <div>
            <!-- Option toggle -->
            <div class="mb-6">
                <label class="block mb-2 text-sm font-semibold form-label">Choose an option:</label>
                <div class="flex flex-col sm:flex-row gap-3 mt-2.5">
                    <div class="option-btn flex-1 py-3 px-3 rounded-xl text-center font-semibold text-sm"
                         :class="{ 'active': selection === 'notify' }"
                         @click="setSelection('notify')">
                        Notify Me
                    </div>
                    <div class="option-btn flex-1 py-3 px-3 rounded-xl text-center font-semibold text-sm"
                         :class="{ 'active': selection === 'dontNotify' }"
                         @click="setSelection('dontNotify')">
                        Don't Notify Me
                    </div>
                </div>
            </div>

            <!-- Full Name (only for Notify Me) -->
            <div class="form-group" :class="{ 'collapsed': selection !== 'notify' }">
                <label class="block mb-2 text-sm font-semibold form-label">Full Name</label>
                <input
                    type="text"
                    x-model="form.fullname"
                    placeholder="Enter your full name"
                    class="form-input w-full py-3 px-4 rounded-xl text-[15px]"
                    :class="{ 'input-error': errors.fullname }"
                    @blur="selection === 'notify' && validateFullname()"
                    @input="errors.fullname = ''"
                >
                <p x-show="errors.fullname" x-text="errors.fullname"
                   class="text-[#ff4444] text-xs mt-1.5"></p>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label class="block mb-2 text-sm font-semibold form-label">Email Address</label>
                <input
                    type="email"
                    x-model="form.email"
                    placeholder="Enter your @isu.edu.ph email"
                    class="form-input w-full py-3 px-4 rounded-xl text-[15px]"
                    :class="{ 'input-error': errors.email }"
                    @blur="validateEmail()"
                    @input="errors.email = ''"
                >
                <p x-show="errors.email" x-text="errors.email"
                   class="text-[#ff4444] text-xs mt-1.5"></p>
            </div>

            <!-- User Type (only for Notify Me) -->
            <div class="form-group" :class="{ 'collapsed': selection !== 'notify' }">
                <label class="block mb-2 text-sm font-semibold form-label">I am a:</label>
                <div class="flex flex-col sm:flex-row gap-3 sm:gap-5 mt-2.5">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="userType" value="student"
                               x-model="form.userType"
                               class="w-[18px] h-[18px] cursor-pointer accent-[#9FE870]"
                               @change="errors.userType = ''">
                        <span class="font-medium text-sm form-label">Student</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="userType" value="faculty"
                               x-model="form.userType"
                               class="w-[18px] h-[18px] cursor-pointer accent-[#9FE870]"
                               @change="errors.userType = ''">
                        <span class="font-medium text-sm form-label">Faculty</span>
                    </label>
                </div>
                <p x-show="errors.userType" x-text="errors.userType"
                   class="text-[#ff4444] text-xs mt-1.5"></p>
            </div>

            <!-- Submit -->
            <button
                @click="submitForm()"
                :disabled="submitting"
                class="w-full py-3.5 rounded-xl text-base font-bold cursor-pointer transition-all duration-300 mt-2.5 text-black
                       hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0
                       disabled:opacity-60 disabled:cursor-not-allowed disabled:transform-none"
                style="background:linear-gradient(135deg,#9FE870,#7acc50); box-shadow: 0 4px 12px var(--shadow-green);">
                <span x-text="submitting ? (selection === 'notify' ? 'Submitting...' : 'Processing...') : 'Submit'"></span>
            </button>
        </div>

        <!-- Success banner -->
        <div x-show="successMsg"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 -translate-y-3"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-text="successMsg"
             class="success-banner py-4 px-4 rounded-xl text-center mt-5 font-semibold shadow-lg">
        </div>

        <!-- Error banner -->
        <div x-show="errorMsg"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 -translate-y-3"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-text="errorMsg"
             class="error-banner py-4 px-4 rounded-xl text-center mt-5 font-semibold shadow-lg">
        </div>
    </div>


    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- CHATBOT (Alpine.js)                                    -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <div x-data="initChatbot()" x-cloak>

        <!-- Toggle button -->
        <button @click="isOpen = !isOpen"
            class="fixed bottom-[160px] right-[30px] w-[50px] h-[50px] rounded-full flex items-center justify-center
                   text-black cursor-pointer z-[999] border-2 text-xl transition-all duration-300
                   hover:scale-110 active:scale-95 notranslate"
            translate="no"
            style="background:linear-gradient(135deg,#9FE870,#8AD95E); border-color:#9FE870; box-shadow:0 4px 12px rgba(159,232,112,0.4);"
            aria-label="Toggle chatbot">
            <i x-show="!isOpen" class="fa-solid fa-robot"></i>
            <i x-show="isOpen"  class="fa-solid fa-xmark"></i>
        </button>

        <!-- Chat window -->
        <div x-show="isOpen"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-90 translate-y-5"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 scale-100 translate-y-0"
             x-transition:leave-end="opacity-0 scale-90 translate-y-5"
             class="fixed bottom-[240px] right-[30px] w-[90vw] max-w-[400px] h-[540px] max-h-[65vh]
                    rounded-3xl border flex flex-col overflow-hidden z-[998]"
             style="background:var(--bg); border-color:var(--border); box-shadow:0 20px 60px rgba(0,0,0,0.4);">

            <!-- Header -->
            <div class="px-4 py-3 border-b flex items-center justify-between gap-3"
                 style="background:var(--surface); border-color:var(--border);">
                <div>
                    <h2 class="font-bold text-sm tracking-wide" style="color:var(--text);">Chatbot</h2>
                    <p class="text-[11px] font-medium" style="color:var(--accent);">Your Campus Assistant</p>
                </div>
                <button @click="isOpen = false"
                        class="hover:opacity-70 transition-opacity w-6 h-6 flex items-center justify-center"
                        style="color:var(--text-muted);">
                    <i class="fa-solid fa-minus text-sm"></i>
                </button>
            </div>

            <!-- Messages -->
            <div id="chatbot-messages-container"
                 class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"
                 style="background:var(--bg);">
                <template x-for="(msg, index) in messages" :key="index">
                    <div :style="msg.role === 'user'
                        ? 'background:linear-gradient(135deg,#9FE870,#8AD95E);color:#000;border:1px solid #9FE870;border-radius:16px 16px 4px 16px;margin-left:auto;max-width:85%;padding:12px;font-size:.875rem;line-height:1.5;'
                        : 'background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:16px 16px 16px 4px;margin-right:auto;max-width:85%;padding:12px;font-size:.875rem;line-height:1.5;'">
                        <p class="whitespace-pre-wrap" x-text="msg.content"></p>
                    </div>
                </template>
                <!-- Loading dots -->
                <div x-show="isLoading"
                     class="flex gap-1 p-3 border self-start"
                     style="border-radius:16px 16px 16px 4px; background:var(--surface); border-color:var(--border);">
                    <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
                    <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
                    <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
                </div>
            </div>

            <!-- Footer input -->
            <div class="p-4 border-t" style="background:var(--surface); border-color:var(--border);">
                <div class="flex gap-2 items-center">
                    <input type="text"
                           x-model="userInput"
                           placeholder="Ask about notifications..."
                           class="flex-1 px-4 py-2.5 rounded-xl border text-[0.875rem] outline-none transition-all duration-300"
                           style="background:var(--card); border-color:var(--border); color:var(--text);"
                           onfocus="this.style.borderColor='var(--accent)';"
                           onblur="this.style.borderColor='var(--border)';"
                           @keydown.enter.prevent="sendMessage()">
                    <button @click="sendMessage()"
                            :disabled="!userInput.trim() || isLoading"
                            class="w-10 h-10 rounded-xl flex items-center justify-center border-none
                                   cursor-pointer transition-all hover:scale-105 disabled:opacity-50"
                            style="background:linear-gradient(135deg,#9FE870,#8AD95E); color:#000; box-shadow:0 4px 12px rgba(159,232,112,0.3);">
                        <i class="fa-solid fa-paper-plane text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>


    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- TRANSLATE BUTTON & DROPDOWN                            -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <button id="translate-toggle-btn"
        class="notranslate fixed bottom-[30px] right-[30px] z-[999] w-[50px] h-[50px] rounded-full
               flex items-center justify-center cursor-pointer text-xl text-black"
        style="background:var(--accent); border:2px solid var(--accent);
               box-shadow:0 4px 12px rgba(159,232,112,0.4); transition:all 0.3s;"
        translate="no"
        aria-label="Toggle translation">
        <i class="fas fa-language"></i>
    </button>
    <div id="google_translate_element"
         class="notranslate translate-dropdown"
         translate="no"
         style="display:none;">
    </div>


    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- SCRIPTS                                                -->
    <!-- ═══════════════════════════════════════════════════════ -->
    <script>
        // ══════════════════════════════════════════════
        // INIT SUPABASE from UI.js
        // ══════════════════════════════════════════════
        const SUPABASE_URL      = window.API_KEYS?.SUPABASE_URL      || '';
        const SUPABASE_ANON_KEY = window.API_KEYS?.SUPABASE_ANON_KEY || '';
        const supabaseClient    = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const emailPattern = /^[a-zA-Z0-9._%+-]+@isu\.edu\.ph$/;

        // ══════════════════════════════════════════════
        // MAIN NOTIFY APP (Alpine x-data)
        // ══════════════════════════════════════════════
        function notifyApp() {
            return {
                // ── State ──
                isDark:     true,
                selection:  'notify',
                submitting: false,
                successMsg: '',
                errorMsg:   '',
                form: {
                    fullname: '',
                    email:    '',
                    userType: '',
                },
                errors: {
                    fullname: '',
                    email:    '',
                    userType: '',
                },

                // ── Init ──
                initPage() {
                    const saved = localStorage.getItem('notifyTheme') || 'dark';
                    this.isDark = saved === 'dark';
                    this.applyTheme();
                },

                // ── Theme ──
                toggleTheme() {
                    this.isDark = !this.isDark;
                    localStorage.setItem('notifyTheme', this.isDark ? 'dark' : 'light');
                    this.applyTheme();
                    setTimeout(applyTranslateColors, 50);
                },
                applyTheme() {
                    if (this.isDark) {
                        document.body.classList.add('dark');
                    } else {
                        document.body.classList.remove('dark');
                    }
                },

                // ── Option selection ──
                setSelection(val) {
                    this.selection = val;
                    // Clear hidden-field errors when switching
                    if (val === 'dontNotify') {
                        this.errors.fullname  = '';
                        this.errors.userType  = '';
                        this.form.fullname    = '';
                        this.form.userType    = '';
                    }
                    this.successMsg = '';
                    this.errorMsg   = '';
                },

                // ── Validation ──
                validateFullname() {
                    if (!this.form.fullname.trim()) {
                        this.errors.fullname = 'Please enter your full name';
                        return false;
                    }
                    this.errors.fullname = '';
                    return true;
                },

                async validateEmail() {
                    const email = this.form.email.trim();
                    if (!email || !emailPattern.test(email)) {
                        this.errors.email = 'Please enter a valid @isu.edu.ph email address';
                        return false;
                    }
                    if (this.selection === 'notify') {
                        const isDup = await this.checkDuplicate(email);
                        if (isDup) {
                            this.errors.email = 'Already registered! This email is already in our notification list.';
                            return false;
                        }
                    }
                    this.errors.email = '';
                    return true;
                },

                validateUserType() {
                    if (!this.form.userType) {
                        this.errors.userType = 'Please select student or faculty';
                        return false;
                    }
                    this.errors.userType = '';
                    return true;
                },

                // ── Duplicate check ──
                async checkDuplicate(email) {
                    try {
                        const { data, error } = await supabaseClient
                            .from('notifications')
                            .select('email')
                            .eq('email', email)
                            .single();
                        if (error && error.code !== 'PGRST116') return false;
                        return !!data;
                    } catch { return false; }
                },

                // ── Insert ──
                async insertToSupabase(data) {
                    try {
                        const { data: ex, error: ce } = await supabaseClient
                            .from('notifications')
                            .select('*')
                            .eq('email', data.email)
                            .single();
                        if (ce && ce.code !== 'PGRST116') return { success: false, error: ce.message };
                        if (ex) return { success: false, error: 'This email is already registered.', isDuplicate: true };

                        const { error } = await supabaseClient.from('notifications').insert([data]);
                        if (error) return { success: false, error: error.message };
                        return { success: true };
                    } catch (err) {
                        return { success: false, error: err.message };
                    }
                },

                // ── Delete ──
                async deleteFromSupabase(email) {
                    try {
                        const { data, error } = await supabaseClient
                            .from('notifications')
                            .delete()
                            .eq('email', email)
                            .select();
                        if (error) return { success: false, error: error.message };
                        return { success: true, deleted: !!(data && data.length > 0) };
                    } catch (err) {
                        return { success: false, error: err.message };
                    }
                },

                // ── Submit ──
                async submitForm() {
                    this.successMsg = '';
                    this.errorMsg   = '';

                    if (this.selection === 'notify') {
                        const n = this.validateFullname();
                        const e = await this.validateEmail();
                        const t = this.validateUserType();
                        if (!n || !e || !t) return;

                        this.submitting = true;
                        const result = await this.insertToSupabase({
                            notification_type: 'notify',
                            fullname:   this.form.fullname.trim(),
                            email:      this.form.email.trim(),
                            user_type:  this.form.userType,
                            created_at: new Date().toISOString()
                        });
                        this.submitting = false;

                        if (result.success) {
                            this.successMsg = "✅ Thank you! You've been successfully registered for notifications.";
                            this.resetForm();
                        } else if (result.isDuplicate) {
                            this.errorMsg = '⚠️ Already registered! This email is already in our notification list.';
                            this.errors.email = 'Already registered! This email is already in our notification list.';
                        } else {
                            this.errorMsg = `Error: ${result.error}`;
                        }

                    } else {
                        // Don't notify — email only
                        const email = this.form.email.trim();
                        if (!email || !emailPattern.test(email)) {
                            this.errors.email = 'Please enter a valid @isu.edu.ph email address';
                            return;
                        }

                        this.submitting = true;
                        const result = await this.deleteFromSupabase(email);
                        this.submitting = false;

                        if (result.success) {
                            this.successMsg = result.deleted
                                ? '✅ Your email has been removed from notifications.'
                                : 'ℹ️ No matching email found in our records.';
                            this.resetForm();
                        } else {
                            this.errorMsg = `Error: ${result.error}`;
                        }
                    }

                    // Auto-hide banners
                    setTimeout(() => { this.successMsg = ''; this.errorMsg = ''; }, 5000);
                },

                // ── Reset ──
                resetForm() {
                    this.form       = { fullname: '', email: '', userType: '' };
                    this.errors     = { fullname: '', email: '', userType: '' };
                    this.selection  = 'notify';
                }
            };
        }


        // ══════════════════════════════════════════════
        // CHATBOT — Alpine x-data
        // ══════════════════════════════════════════════
        function initChatbot() {
            return {
                isOpen:    false,
                userInput: '',
                isLoading: false,
                sessionId: 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                messages:  [{ role: 'assistant', content: 'Hi! I can help you with the Notify Me page — signing up for notifications, removing your email, or any general questions. What would you like to know?' }],

                async sendMessage() {
                    if (!this.userInput.trim()) return;
                    this.messages.push({ role: 'user', content: this.userInput });
                    const input = this.userInput;
                    this.userInput  = '';
                    this.isLoading  = true;
                    this.scrollToBottom();

                    let replyAppended = false;
                    try {
                        const sysMsg = {
                            role: 'system',
                            content: `You are the CentraNounceIT Notification Assistant helping students and faculty manage their notification preferences.
This page allows users to:
1. Sign up for notifications ("Notify Me") by entering their full name, @isu.edu.ph email, and selecting Student or Faculty.
2. Remove themselves from notifications ("Don't Notify Me") by entering their email only.
Be concise, friendly, and helpful. Only @isu.edu.ph emails are accepted.`
                        };
                        const msgs   = [sysMsg, ...this.messages.map(m => ({ role: m.role, content: m.content }))];
                        const models = ['llama-3.3-70b-versatile', 'llama-3.1-8b-instant', 'mixtral-8x7b-32768', 'llama3-8b-8192'];
                        let response = null, lastErr = '';

                        // 7-key round-robin rotation
                        for (let keyAttempt = 0; keyAttempt < 7; keyAttempt++) {
                            const apiKey = window.API_HELPERS.getGroqKey();
                            for (const model of models) {
                                try {
                                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                                        method:  'POST',
                                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                                        body:    JSON.stringify({ model, messages: msgs, temperature: 0.7, max_tokens: 1024 })
                                    });
                                    if (res.ok) { response = res; break; }
                                    lastErr = await res.text();
                                    if (res.status !== 429 && res.status !== 413) break;
                                } catch (fe) { lastErr = fe.message; }
                            }
                            if (response) break;
                            if (lastErr.includes('429') || lastErr.includes('rate limit')) {
                                window.API_HELPERS.rotateGroqKey();
                            } else { break; }
                        }

                        if (!response) {
                            const wm = lastErr.match(/try again in (\d+m[\d.]+s|\d+s)/i);
                            throw new Error(wm ? `RATE_LIMITED:${wm[1]}` : 'API_FAILED');
                        }

                        const data = await response.json();
                        if (!data.choices?.length) throw new Error('No choices from API');
                        const reply = data.choices[0].message.content;
                        this.messages.push({ role: 'assistant', content: reply });
                        replyAppended = true;

                        // Optionally save to chat_history
                        supabaseClient.from('chat_history').insert([{
                            session_id:          this.sessionId,
                            user_message:        input,
                            assistant_response:  reply,
                            has_security_concern: false,
                            created_at:          new Date().toISOString()
                        }]).then(({ error }) => { if (error) console.warn('Chat save error:', error.message); });

                    } catch (err) {
                        if (!replyAppended) {
                            let msg = 'Sorry, I encountered an error. Please try again.';
                            if (err.message?.startsWith('RATE_LIMITED:'))
                                msg = `⏳ Rate limited. Please try again in ${err.message.replace('RATE_LIMITED:', '')}`;
                            this.messages.push({ role: 'assistant', content: msg });
                        }
                        console.error('Chatbot error:', err);
                    } finally {
                        this.isLoading = false;
                        this.scrollToBottom();
                    }
                },

                scrollToBottom() {
                    this.$nextTick(() => {
                        const c = document.getElementById('chatbot-messages-container');
                        if (c) c.scrollTop = c.scrollHeight;
                    });
                }
            };
        }


        // ══════════════════════════════════════════════
        // GOOGLE TRANSLATE
        // ══════════════════════════════════════════════
        function getThemeColors() {
            const isDark = document.body.classList.contains('dark');
            return {
                text:   isDark ? '#ffffff'  : '#163300',
                bg:     isDark ? '#1a1a1a'  : '#e8f5e0',
                border: isDark ? '#2d5514'  : '#c9e5ba'
            };
        }

        function applyTranslateColors() {
            const dd = document.getElementById('google_translate_element');
            if (!dd) return;
            const { text, bg, border } = getThemeColors();
            const combo = dd.querySelector('.goog-te-combo,select');
            if (combo) {
                combo.style.setProperty('color',            text,   'important');
                combo.style.setProperty('background-color', bg,     'important');
                combo.style.setProperty('border',           `1px solid ${border}`, 'important');
                combo.style.setProperty('border-radius',    '8px',  'important');
                combo.style.setProperty('padding',          '6px 10px', 'important');
                combo.style.setProperty('font-weight',      '600',  'important');
                combo.style.setProperty('font-family',      'Inter,sans-serif', 'important');
                combo.style.setProperty('font-size',        '0.85rem', 'important');
                combo.style.setProperty('outline',          'none', 'important');
                combo.style.setProperty('cursor',           'pointer', 'important');
                combo.querySelectorAll('option').forEach(o => {
                    o.style.setProperty('color',            text, 'important');
                    o.style.setProperty('background-color', bg,   'important');
                });
            }
            dd.querySelectorAll('span,a,.goog-te-menu-value,.goog-te-menu-value span').forEach(el => {
                el.style.setProperty('color', text, 'important');
            });
        }

        function suppressTranslateBanner() {
            function hide() {
                document.querySelectorAll('.goog-te-banner-frame,.skiptranslate > iframe,#goog-gt-tt,.goog-te-balloon-frame').forEach(el => {
                    el.style.setProperty('display',    'none',   'important');
                    el.style.setProperty('height',     '0',      'important');
                    el.style.setProperty('visibility', 'hidden', 'important');
                });
                if (document.body.style.top && document.body.style.top !== '0px') {
                    document.body.style.setProperty('top',       '0', 'important');
                    document.body.style.setProperty('margin-top','0', 'important');
                }
            }
            new MutationObserver(hide).observe(document.body, { attributes: true, attributeFilter: ['style','class'], childList: true });
            new MutationObserver(hide).observe(document.head,  { childList: true });
            hide();
        }

        function initTranslationToggle() {
            const btn = document.getElementById('translate-toggle-btn');
            const dd  = document.getElementById('google_translate_element');
            if (!btn || !dd) return;

            btn.addEventListener('click', e => {
                e.stopPropagation();
                const vis = dd.style.display === 'block';
                dd.style.display = vis ? 'none' : 'block';
                if (!vis) applyTranslateColors();
            });

            document.addEventListener('click', e => {
                if (!e.target.closest('#translate-toggle-btn') && !e.target.closest('#google_translate_element'))
                    dd.style.display = 'none';
            });

            // Watch GT widget injection for color re-apply
            new MutationObserver(applyTranslateColors).observe(dd, {
                childList: true, subtree: true, attributes: true, attributeFilter: ['style']
            });

            // Poll for 10s after load
            let tries = 0;
            const poll = setInterval(() => {
                applyTranslateColors();
                if (++tries >= 20) clearInterval(poll);
            }, 500);

            suppressTranslateBanner();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initTranslationToggle);
        } else {
            initTranslationToggle();
        }
    </script>
