    const themeToggle=document.getElementById('themeToggle');
    const themeIcon=themeToggle.querySelector('i');
    function setIcon(isDark){if(isDark){themeIcon.classList.replace('fa-moon','fa-sun');themeToggle.classList.add('text-yellow-400');themeToggle.classList.remove('text-gray-600');}else{themeIcon.classList.replace('fa-sun','fa-moon');themeToggle.classList.remove('text-yellow-400');themeToggle.classList.add('text-gray-600');}}
    function toggleDarkMode(){const d=document.documentElement.classList.toggle('dark');localStorage.theme=d?'dark':'light';setIcon(d);applyTranslateColors();if(currentTable==='dashboard')showDashboard();}
    themeToggle.addEventListener('click',toggleDarkMode);

    // ════════════════════════════════════════
    // GOOGLE TRANSLATE
    // ════════════════════════════════════════
    function applyTranslateColors(){
        const isDark=document.documentElement.classList.contains('dark');
        const text=isDark?'#E0E0E0':'#333',bg=isDark?'#121212':'#F5F5F5',border=isDark?'#333333':'#E0E0E0';
        const dd=document.getElementById('google_translate_element');if(!dd)return;
        const combo=dd.querySelector('.goog-te-combo,select');
        if(combo){combo.style.setProperty('color',text,'important');combo.style.setProperty('background-color',bg,'important');combo.style.setProperty('border',`1px solid ${border}`,'important');combo.style.setProperty('border-radius','8px','important');combo.style.setProperty('padding','6px 10px','important');combo.style.setProperty('font-weight','600','important');combo.style.setProperty('font-family','Poppins,sans-serif','important');combo.style.setProperty('font-size','.85rem','important');combo.style.setProperty('outline','none','important');combo.style.setProperty('cursor','pointer','important');combo.querySelectorAll('option').forEach(o=>{o.style.setProperty('color',text,'important');o.style.setProperty('background-color',bg,'important');});}
        dd.querySelectorAll('span,a,.goog-te-menu-value,.goog-te-menu-value span').forEach(el=>el.style.setProperty('color',text,'important'));
    }
    function suppressTranslateBanner(){
        function hide(){document.querySelectorAll('.goog-te-banner-frame,.skiptranslate > iframe,#goog-gt-tt,.goog-te-balloon-frame').forEach(el=>{el.style.setProperty('display','none','important');el.style.setProperty('height','0','important');el.style.setProperty('visibility','hidden','important');});if(document.body.style.top&&document.body.style.top!=='0px'){document.body.style.setProperty('top','0','important');document.body.style.setProperty('margin-top','0','important');}}
        new MutationObserver(hide).observe(document.body,{attributes:true,attributeFilter:['style','class'],childList:true});
        new MutationObserver(hide).observe(document.head,{childList:true});
        hide();
    }
    function initTranslationToggle(){
        const btn=document.getElementById('translate-toggle-btn'),dd=document.getElementById('google_translate_element');
        if(!btn||!dd)return;
        btn.addEventListener('click',e=>{e.stopPropagation();const vis=dd.style.display==='block';dd.style.display=vis?'none':'block';if(!vis)applyTranslateColors();});
        document.addEventListener('click',e=>{if(!e.target.closest('#translate-toggle-btn')&&!e.target.closest('#google_translate_element'))dd.style.display='none';});
        themeToggle.addEventListener('click',()=>setTimeout(applyTranslateColors,50));
        new MutationObserver(applyTranslateColors).observe(dd,{childList:true,subtree:true,attributes:true,attributeFilter:['style']});
        let tries=0;const poll=setInterval(()=>{applyTranslateColors();if(++tries>=20)clearInterval(poll);},500);
        suppressTranslateBanner();
    }

    // ════════════════════════════════════════
    // INIT
    // ════════════════════════════════════════
    window.addEventListener('DOMContentLoaded', async()=>{
        setIcon(document.documentElement.classList.contains('dark'));
        document.getElementById('tableSearchInput').addEventListener('input',e=>handleSearch(e.target.value));
        if(localStorage.getItem('autoDeleteEnabled')==='true')await autoClearOldArchives();
        initTranslationToggle();
        await showDashboard();
    });
    </script>
</body>
</html>
