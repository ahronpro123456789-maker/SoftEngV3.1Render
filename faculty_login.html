<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRANOUNCEIT DEPTHUB - Login</title>
    <link rel="icon" type="image/x-icon" href="CCSICTLOGOCROP.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="UI.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ph-orange':      '#9FE870',
                        'ph-orange-hover':'#7acc50',
                        'ph-dark':        '#000000',
                        'ph-black':       '#1a1a1a',
                        'ph-gray':        '#2d5514',
                        'ph-light-gray':  '#b8d6a0',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-image-section { background-image: url('BG.jpg'); background-position: center; }
        #loginButton { background: linear-gradient(135deg, #9FE870 0%, #7acc50 100%); color: #000000; box-shadow: 0 4px 12px rgba(159, 232, 112, 0.3); }
        #loginButton:hover { opacity: 0.9; box-shadow: 0 8px 20px rgba(159, 232, 112, 0.3); }
        .logo-themed { border-color: #9FE870; box-shadow: 0 0 20px rgba(159, 232, 112, 0.5); }
    </style>
</head>
<body class="bg-ph-dark">

    <div class="flex min-h-screen flex-col lg:flex-row">

        <!-- ── LEFT: Login Form ── -->
        <div class="w-full lg:w-2/5 flex items-center justify-center p-6 sm:p-8 lg:p-12 bg-ph-dark order-2 lg:order-1">
            <div class="w-full max-w-md text-center">

                <!-- Logo -->
                <div class="mx-auto w-20 h-20 sm:w-24 sm:h-24 mb-6">
                    <img src="CCSICTLOGOCROP.png" alt="Department Logo" class="w-full h-full object-cover rounded-full border-4 logo-themed">
                </div>

                <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold text-ph-orange mb-2">CentraAnnounceIT</h2>
                <h3 class="text-xl sm:text-2xl lg:text-3xl font-bold text-white mb-3">DeptHub</h3>
                <p class="text-ph-light-gray text-sm sm:text-base mb-8">Faculty Login Portal</p>

                <form id="loginForm" class="space-y-5">

                    <!-- OTP Step (hidden initially) -->
                    <div id="otpWrapper" class="space-y-5 hidden">
                        <div>
                            <input
                                type="text"
                                name="otp"
                                id="otp"
                                placeholder="Enter 6-Digit OTP"
                                autocomplete="one-time-code"
                                inputmode="numeric"
                                pattern="\d{6}"
                                maxlength="6"
                                class="w-full px-4 py-3 sm:py-3.5 bg-ph-black border-2 border-ph-gray rounded-lg text-white placeholder-ph-light-gray focus:outline-none focus:border-ph-orange focus:ring-4 focus:ring-ph-orange/30 transition-all duration-300 text-sm sm:text-base text-center tracking-[0.5em]"
                            >
                        </div>
                        <div id="otpTimer" class="text-center">
                            <p class="text-ph-light-gray text-sm">
                                OTP expires in: <span id="countdown" class="text-ph-orange font-semibold">10:00</span>
                            </p>
                        </div>
                    </div>

                    <!-- Credentials Step -->
                    <div id="credentialsWrapper" class="space-y-5">
                        <div>
                            <input
                                type="email"
                                name="email"
                                id="email"
                                placeholder="Email Address"
                                required
                                autocomplete="email"
                                class="w-full px-4 py-3 sm:py-3.5 bg-ph-black border-2 border-ph-gray rounded-lg text-white placeholder-ph-light-gray focus:outline-none focus:border-ph-orange focus:ring-4 focus:ring-ph-orange/30 transition-all duration-300 text-sm sm:text-base"
                            >
                        </div>

                        <div class="relative">
                            <input
                                type="password"
                                name="password"
                                id="password"
                                placeholder="Password"
                                required
                                autocomplete="current-password"
                                class="w-full px-4 py-3 sm:py-3.5 bg-ph-black border-2 border-ph-gray rounded-lg text-white placeholder-ph-light-gray focus:outline-none focus:border-ph-orange focus:ring-4 focus:ring-ph-orange/30 transition-all duration-300 text-sm sm:text-base pr-12"
                            >
                            <button
                                type="button"
                                id="togglePassword"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-ph-light-gray hover:text-ph-orange transition-colors duration-300 focus:outline-none"
                                aria-label="Toggle password visibility"
                            >
                                <svg id="eyeIconClosed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                </svg>
                                <svg id="eyeIconOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>

                        <div class="flex items-center">
                            <input id="rememberMe" name="rememberMe" type="checkbox"
                                class="h-4 w-4 rounded border-ph-gray text-ph-orange focus:ring-ph-orange bg-ph-black">
                            <label for="rememberMe" class="ml-2 block text-sm text-ph-light-gray">
                                Remember me for 7 days
                            </label>
                        </div>

                        <div class="flex justify-center">
                            <div class="g-recaptcha" data-sitekey="6LeXz-0rAAAAAJS-CB-4LwZrIF6jvKW6V8xHBQrk" data-theme="dark"></div>
                        </div>
                    </div>

                    <div>
                        <button
                            type="submit"
                            id="loginButton"
                            class="w-full text-black font-bold py-3.5 sm:py-4 px-4 rounded-lg transition-all duration-300 transform hover:-translate-y-1 text-base sm:text-lg disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                        >
                            Login
                        </button>
                    </div>
                </form>

                <div class="mt-4">
                    <a href="forgot_Password.html" id="forgotPasswordLink"
                        class="text-sm text-ph-light-gray hover:text-ph-orange transition-colors duration-300">
                        Forgot Password?
                    </a>
                </div>

                <div id="messageArea" class="mt-4 text-center text-sm sm:text-base font-semibold text-red-500 min-h-[24px]"></div>
                <div id="attemptCounter" class="mt-2 text-center text-xs sm:text-sm text-ph-light-gray"></div>

                <div class="mt-6">
                    <a href="teststartuppage.html" class="inline-flex items-center gap-2 text-sm sm:text-base text-ph-light-gray hover:text-ph-orange transition-colors duration-300">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Go Back
                    </a>
                </div>

            </div>
        </div>

        <!-- ── RIGHT: Hero ── -->
        <div class="hidden lg:flex w-3/5 flex-col justify-between p-8 xl:p-12 bg-image-section bg-ph-black text-white order-1 lg:order-2 relative">
            <div class="absolute inset-0 bg-gradient-to-br from-ph-black/60 via-ph-black/40 to-transparent"></div>
            <div class="relative text-xl xl:text-2xl font-bold text-ph-orange">
                🌐 A centralized web-based CENTRANOUNCEIT DEPTHUB Platform
            </div>
            <div class="relative max-w-lg">
                <h1 class="text-3xl xl:text-4xl 2xl:text-5xl font-bold leading-tight mb-4">
                    Welcome to the <span class="text-ph-orange">CENTRANOUNCEIT DEPTHUB</span>
                </h1>
                <p class="text-base xl:text-lg opacity-90">Connecting students and faculty seamlessly with real-time announcements and updates.</p>
            </div>
        </div>
    </div>

    <script>
    // ════════════════════════════════════════
    // INIT — all keys from keys.js
    // ════════════════════════════════════════
    const supabaseClient = supabase.createClient(
        window.API_KEYS?.SUPABASE_URL      || '',
        window.API_KEYS?.SUPABASE_ANON_KEY || ''
    );

    // EmailJS — init from keys.js
    emailjs.init(window.API_KEYS?.EMAILJS_PUBLIC_KEY_LOGIN || '');

    // EmailJS service + template from keys.js
    const EMAILJS_SERVICE_ID  = window.API_KEYS?.EMAILJS_SERVICE_ID_LOGIN  || '';
    const EMAILJS_TEMPLATE_ID = window.API_KEYS?.EMAILJS_TEMPLATE_ID_LOGIN || '';

    // ════════════════════════════════════════
    // CONFIG
    // ════════════════════════════════════════
    const ADMIN_PAGE  = 'admin_Access.html';
    const MEMBER_PAGE = 'faculty_Dashboard.html';
    const MAX_ATTEMPTS   = 5;
    const LOCKOUT_TIME   = 15 * 60 * 1000; // 15 min
    const OTP_EXPIRATION_MINUTES = 10;

    // ════════════════════════════════════════
    // ELEMENTS
    // ════════════════════════════════════════
    const loginForm          = document.getElementById('loginForm');
    const messageArea        = document.getElementById('messageArea');
    const attemptCounter     = document.getElementById('attemptCounter');
    const loginButton        = document.getElementById('loginButton');
    const togglePassword     = document.getElementById('togglePassword');
    const passwordInput      = document.getElementById('password');
    const eyeIconClosed      = document.getElementById('eyeIconClosed');
    const eyeIconOpen        = document.getElementById('eyeIconOpen');
    const emailInput         = document.getElementById('email');
    const otpWrapper         = document.getElementById('otpWrapper');
    const otpInput           = document.getElementById('otp');
    const credentialsWrapper = document.getElementById('credentialsWrapper');
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');
    const countdownElement   = document.getElementById('countdown');
    const rememberMeCheckbox = document.getElementById('rememberMe');

    // ════════════════════════════════════════
    // STATE
    // ════════════════════════════════════════
    let loginAttempts = 0;
    let awaitingOtp   = false;
    let otpTimer      = null;
    let otpExpirationTime = null;

    // ════════════════════════════════════════
    // OTP HELPERS
    // ════════════════════════════════════════
    function generateOTP() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }

    function startOtpCountdown() {
        otpExpirationTime = Date.now() + (OTP_EXPIRATION_MINUTES * 60 * 1000);
        if (otpTimer) clearInterval(otpTimer);
        otpTimer = setInterval(updateCountdown, 1000);
        updateCountdown();
    }

    function updateCountdown() {
        const timeLeft = otpExpirationTime - Date.now();
        if (timeLeft <= 0) {
            clearInterval(otpTimer); otpTimer = null;
            countdownElement.textContent = '00:00';
            countdownElement.classList.replace('text-ph-orange', 'text-red-500');
            otpInput.disabled = true;
            otpInput.classList.add('opacity-50');
            messageArea.textContent = '✗ OTP has expired. Please request a new one.';
            messageArea.className = 'mt-4 text-center text-sm font-semibold text-red-500 min-h-[24px]';
            setTimeout(resetToLoginState, 3000);
            return;
        }
        const mins = Math.floor(timeLeft / 60000);
        const secs = Math.floor((timeLeft % 60000) / 1000);
        countdownElement.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        if (timeLeft < 2 * 60 * 1000) {
            countdownElement.classList.replace('text-ph-orange', 'text-red-500');
        }
    }

    function stopOtpCountdown() {
        if (otpTimer) { clearInterval(otpTimer); otpTimer = null; }
    }

    function resetToLoginState() {
        stopOtpCountdown();
        credentialsWrapper.classList.remove('hidden');
        forgotPasswordLink.classList.remove('hidden');
        otpWrapper.classList.add('hidden');
        otpInput.value = '';
        otpInput.disabled = false;
        otpInput.classList.remove('opacity-50');
        countdownElement.textContent = '10:00';
        countdownElement.classList.replace('text-red-500', 'text-ph-orange');
        loginButton.textContent = 'Login';
        awaitingOtp = false;
        sessionStorage.removeItem('otpVerificationData');
        messageArea.textContent = '';
    }

    async function sendOtpEmail(userEmail, userName, otp) {
        try {
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                to_email: userEmail,
                to_name:  userName || 'User',
                otp_code: otp,
            });
            console.log('✅ OTP email sent.');
            return true;
        } catch (err) {
            console.error('EmailJS error:', err);
            messageArea.textContent = `✗ Failed to send OTP. Error: ${err.text || err.message}`;
            messageArea.className = 'mt-4 text-center text-sm font-semibold text-red-500 min-h-[24px]';
            return false;
        }
    }

    // ════════════════════════════════════════
    // PASSWORD TOGGLE
    // ════════════════════════════════════════
    togglePassword.addEventListener('click', () => {
        const isPassword = passwordInput.getAttribute('type') === 'password';
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
        eyeIconClosed.classList.toggle('hidden', isPassword);
        eyeIconOpen.classList.toggle('hidden', !isPassword);
    });

    // ════════════════════════════════════════
    // LOCKOUT
    // ════════════════════════════════════════
    function checkLockout() {
        const data = localStorage.getItem('loginLockout');
        if (!data) return false;
        const { timestamp, attempts } = JSON.parse(data);
        const now = new Date().getTime();
        if (now - timestamp < LOCKOUT_TIME && attempts >= MAX_ATTEMPTS) {
            const remaining = Math.ceil((LOCKOUT_TIME - (now - timestamp)) / 60000);
            messageArea.textContent = `✗ Too many failed attempts. Try again in ${remaining} minutes`;
            messageArea.className = 'mt-4 text-center text-sm font-semibold text-red-500 min-h-[24px]';
            loginButton.disabled = true;
            attemptCounter.textContent = 'Account temporarily locked';
            return true;
        }
        if (now - timestamp >= LOCKOUT_TIME) {
            localStorage.removeItem('loginLockout');
            loginAttempts = 0;
            loginButton.disabled = false;
        } else {
            loginAttempts = attempts;
        }
        return false;
    }

    function updateAttemptCounter() {
        const remaining = MAX_ATTEMPTS - loginAttempts;
        if (loginAttempts > 0) {
            attemptCounter.textContent = `${remaining} attempt${remaining !== 1 ? 's' : ''} remaining`;
            attemptCounter.classList.add('text-yellow-500');
        }
    }

    // ════════════════════════════════════════
    // SESSION
    // ════════════════════════════════════════
    function setLoginSession(userData) {
        localStorage.setItem('loggedInUser', JSON.stringify(userData));
        sessionStorage.removeItem('loggedInUser');
    }

    function checkExistingSession() {
        const stored = localStorage.getItem('loggedInUser');
        if (!stored) return;
        const userData = JSON.parse(stored);
        window.location.href = userData.userType === 'admin' ? ADMIN_PAGE : MEMBER_PAGE;
    }

    // ════════════════════════════════════════
    // REMEMBER ME — uses updated table names
    // ════════════════════════════════════════
    async function fetchRememberMePreference() {
        const email = emailInput.value.trim();
        if (!email) return;
        try {
            // Check adminstest first
            const { data: admin } = await supabaseClient
                .from('adminstest')
                .select('remember_me_preference')
                .eq('email', email)
                .maybeSingle();
            if (admin) { rememberMeCheckbox.checked = !!admin.remember_me_preference; return; }

            // Then memberstest
            const { data: member } = await supabaseClient
                .from('memberstest')
                .select('remember_me_preference')
                .eq('email', email)
                .maybeSingle();
            if (member) { rememberMeCheckbox.checked = !!member.remember_me_preference; }
        } catch (err) {
            console.warn('Could not fetch remember me preference:', err.message);
        }
    }

    // ════════════════════════════════════════
    // INIT
    // ════════════════════════════════════════
    checkExistingSession();
    checkLockout();
    updateAttemptCounter();
    emailInput.addEventListener('blur', fetchRememberMePreference);

    // ════════════════════════════════════════
    // LOGIN SUBMIT HANDLER
    // ════════════════════════════════════════
    loginForm.addEventListener('submit', async function(event) {
        event.preventDefault();
        messageArea.textContent = '';

        if (checkLockout() && !awaitingOtp) return;

        const submitButton = loginForm.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.textContent = 'Processing...';
        submitButton.classList.add('opacity-70', 'cursor-not-allowed');

        const rememberMe = rememberMeCheckbox.checked;

        try {
            // ── STATE 2: VERIFY OTP ──
            if (awaitingOtp) {
                const enteredOtp = otpInput.value.trim();
                const storedData = sessionStorage.getItem('otpVerificationData');
                if (!storedData) throw new Error('Session expired. Please start over.');

                const { otp, userData, userType, redirectPage } = JSON.parse(storedData);

                if (enteredOtp === otp) {
                    stopOtpCountdown();
                    messageArea.textContent = '✓ OTP Verified! Logging in...';
                    messageArea.className = 'mt-4 text-center text-sm font-semibold text-ph-orange min-h-[24px]';

                    setLoginSession(userData);
                    sessionStorage.removeItem('otpVerificationData');
                    console.log(`✅ ${userType} login successful:`, userData.email);

                    // Update remember_me_preference in correct table
                    const tbl = userType === 'Admin' ? 'adminstest' : 'memberstest';
                    await supabaseClient.from(tbl).update({ remember_me_preference: rememberMe }).eq('id', userData.id);

                    setTimeout(() => { window.location.href = redirectPage; }, 1000);
                } else {
                    messageArea.textContent = '✗ Invalid OTP. Please try again.';
                    messageArea.className = 'mt-4 text-center text-sm font-semibold text-red-500 min-h-[24px]';
                    otpInput.focus();
                }

            // ── STATE 1: VERIFY CREDENTIALS ──
            } else {
                const email    = emailInput.value.trim();
                const password = passwordInput.value;

                // reCAPTCHA check
                const recaptchaResponse = grecaptcha.getResponse();
                if (!recaptchaResponse) {
                    messageArea.textContent = '✗ Please complete the reCAPTCHA verification';
                    messageArea.className = 'mt-4 text-center text-sm font-semibold text-red-500 min-h-[24px]';
                    grecaptcha.reset();
                    return;
                }

                // Supabase Auth — verify password
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({ email, password });

                if (authError) {
                    loginAttempts++;
                    localStorage.setItem('loginLockout', JSON.stringify({ timestamp: new Date().getTime(), attempts: loginAttempts }));
                    if (loginAttempts >= MAX_ATTEMPTS) {
                        messageArea.textContent = '✗ Maximum attempts exceeded. Account locked for 15 minutes';
                        loginButton.disabled = true;
                        attemptCounter.textContent = 'Account temporarily locked';
                        attemptCounter.classList.add('text-red-500');
                    } else {
                        messageArea.textContent = '✗ Invalid email or password';
                        messageArea.className = 'mt-4 text-center text-sm font-semibold text-red-500 min-h-[24px]';
                        updateAttemptCounter();
                    }
                    grecaptcha.reset();
                    return;
                }

                // Fetch profile from adminstest or memberstest
                const loggedInUser = authData.user;
                let userData = null, userType = null, redirectPage = null;

                // Check adminstest
                const { data: adminData } = await supabaseClient
                    .from('adminstest')
                    .select('*')
                    .eq('email', loggedInUser.email)
                    .maybeSingle();

                if (adminData) {
                    userData = {
                        id:         adminData.id,
                        email:      adminData.email,
                        avatar_url: adminData.avatar_url || null,
                        userType:   'admin',
                        loginTime:  new Date().toISOString()
                    };
                    userType     = 'Admin';
                    redirectPage = ADMIN_PAGE;
                } else {
                    // Check memberstest
                    const { data: memberData } = await supabaseClient
                        .from('memberstest')
                        .select('*')
                        .eq('email', loggedInUser.email)
                        .maybeSingle();

                    if (memberData) {
                        // Bouncer: block unapproved accounts
                        if (memberData.is_approved === false) {
                            messageArea.textContent = '✗ Your account is pending admin approval. Please check back later.';
                            messageArea.className = 'mt-4 text-center text-sm font-semibold text-red-500 min-h-[24px]';
                            await supabaseClient.auth.signOut();
                            grecaptcha.reset();
                            return;
                        }

                        userData = {
                            id:         memberData.id,
                            email:      memberData.email,
                            firstName:  memberData.firstName,
                            lastName:   memberData.lastName,
                            user_type:  memberData.user_type,
                            avatar_url: memberData.avatar_url || null,
                            userType:   'member',
                            created_at: memberData.created_at,
                            loginTime:  new Date().toISOString()
                        };
                        userType     = 'Member';
                        redirectPage = MEMBER_PAGE;
                    }
                }

                if (!userData) {
                    messageArea.textContent = '✗ Account authenticated but profile missing. Contact admin.';
                    messageArea.className = 'mt-4 text-center text-sm font-semibold text-red-500 min-h-[24px]';
                    await supabaseClient.auth.signOut();
                    grecaptcha.reset();
                    return;
                }

                // Send OTP
                const otp = generateOTP();
                const displayName = userData.firstName
                    ? `${userData.firstName} ${userData.lastName||''}`.trim()
                    : userData.email;

                messageArea.textContent = '⏳ Sending OTP to your email...';
                messageArea.className = 'mt-4 text-center text-sm font-semibold text-ph-orange min-h-[24px]';

                const sent = await sendOtpEmail(userData.email, displayName, otp);
                if (!sent) { grecaptcha.reset(); return; }

                // Store OTP data in session storage
                sessionStorage.setItem('otpVerificationData', JSON.stringify({ otp, userData, userType, redirectPage }));

                // Switch UI to OTP step
                credentialsWrapper.classList.add('hidden');
                forgotPasswordLink.classList.add('hidden');
                otpWrapper.classList.remove('hidden');
                submitButton.textContent = 'Verify OTP';
                awaitingOtp = true;
                startOtpCountdown();

                messageArea.textContent = `✓ OTP sent to ${userData.email}. Check your inbox.`;
                messageArea.className = 'mt-4 text-center text-sm font-semibold text-ph-orange min-h-[24px]';
            }

        } catch (err) {
            messageArea.textContent = `✗ An error occurred: ${err.message}`;
            messageArea.className = 'mt-4 text-center text-sm font-semibold text-red-500 min-h-[24px]';
            console.error('Login error:', err);
            if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
            awaitingOtp = false;
        } finally {
            if (!checkLockout() || awaitingOtp) {
                submitButton.disabled = false;
                submitButton.classList.remove('opacity-70', 'cursor-not-allowed');
                if (!awaitingOtp) submitButton.textContent = 'Login';
            }
        }
    });
    </script>
</body>
</html>
