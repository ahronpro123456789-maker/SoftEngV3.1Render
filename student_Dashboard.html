<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="CCSICTLOGOCROP.png">
    <title>DCH Student Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="UI.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,tl',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ── CSS VARIABLES: dark default, light on body.light-mode ── */
        :root {
            --bg:         #000000;
            --surface:    #0f0f0f;
            --card:       #1a1a1a;
            --border:     #2d5514;
            --text:       #ffffff;
            --text-muted: #b8d6a0;
            --hover:      #1a1a1a;
            --accent:     #9FE870;
            --accent-dark:#7acc50;
        }
        body.light-mode {
            --bg:         #f5faf2;
            --surface:    #ffffff;
            --card:       #e8f5e0;
            --border:     #c9e5ba;
            --text:       #163300;
            --text-muted: #2d5514;
            --hover:      #e8f5e0;
            --accent:     #7acc50;
            --accent-dark:#5cad38;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; line-height: 1.6; background-color: var(--bg); color: var(--text); transition: background-color .3s, color .3s; }

        /* ── Banner categories ── */
        #main-content.all-announcement .news-banner { background: linear-gradient(135deg, #1a2a0f, #0f1a07); color: #9FE870; }
        #main-content.emergency .news-banner        { background: linear-gradient(135deg, #D32F2F, #b71c1c); color: #fff; }
        #main-content.deadline .news-banner         { background: linear-gradient(135deg, #9FE870, #7acc50); color: #000 !important; }
        #main-content.news .news-banner             { background: linear-gradient(135deg, #1a2a0f, #0f1a07); color: #9FE870; }
        #main-content.memo .news-banner             { background: linear-gradient(135deg, #2d5514, #163300); color: #9FE870; }
        #main-content.notices .news-banner          { background: linear-gradient(135deg, #7acc50, #9FE870); color: #000 !important; }
        body.light-mode #main-content.all-announcement .news-banner { background: linear-gradient(135deg, #2d5514, #163300); color: #9FE870; }
        body.light-mode #main-content.emergency .news-banner        { background: linear-gradient(135deg, #D32F2F, #b71c1c); color: #fff; }
        body.light-mode #main-content.deadline .news-banner         { background: linear-gradient(135deg, #9FE870, #7acc50); color: #000 !important; }
        body.light-mode #main-content.news .news-banner             { background: linear-gradient(135deg, #2d5514, #163300); color: #9FE870; }
        body.light-mode #main-content.memo .news-banner             { background: linear-gradient(135deg, #163300, #0f2000); color: #9FE870; }
        body.light-mode #main-content.notices .news-banner          { background: linear-gradient(135deg, #7acc50, #9FE870); color: #000 !important; }

        /* ── News card top accent bar ── */
        .news-card::before { content:''; position:absolute; top:0; left:0; width:100%; height:4px; background:linear-gradient(90deg,#9FE870,#7acc50); transform:scaleX(0); transition:transform .3s; }
        .news-card:hover::before { transform:scaleX(1); }

        /* ── Highlight text ── */
        .highlight-text { background-color:rgba(159,232,112,.25); padding:2px 6px; border-radius:4px; font-weight:600; }

        /* ── Google Translate banner suppression ── */
        .goog-te-banner-frame,
        .goog-te-banner-frame.skiptranslate,
        .skiptranslate > iframe,
        #goog-gt-tt,
        .goog-te-balloon-frame { display:none !important; visibility:hidden !important; height:0 !important; }
        body { top:0 !important; position:static !important; }
        body.translated-ltr, body.translated-rtl { top:0 !important; margin-top:0 !important; }
        .goog-te-gadget { font-family:'Inter',sans-serif !important; font-size:.85rem !important; line-height:1 !important; }
        .goog-te-gadget-simple { background-color:var(--card) !important; border:1px solid var(--border) !important; border-radius:8px !important; padding:6px 10px !important; }
        .goog-te-gadget-simple .goog-te-menu-value,
        .goog-te-gadget-simple .goog-te-menu-value span,
        .goog-te-gadget-simple span,
        .goog-te-gadget-simple a { color:var(--text) !important; font-weight:600 !important; background:none !important; }
        .goog-te-gadget-icon { display:none !important; }
        #google_translate_element select, .goog-te-combo { background-color:var(--card) !important; color:var(--text) !important; border:1px solid var(--border) !important; border-radius:8px !important; padding:6px 10px !important; font-family:'Inter',sans-serif !important; font-size:.85rem !important; font-weight:600 !important; outline:none !important; cursor:pointer !important; }
        #google_translate_element select option, .goog-te-combo option { background-color:var(--card) !important; color:var(--text) !important; }

        /* ── Translate dropdown ── */
        .translate-dropdown { position:fixed; bottom:90px; right:30px; background:var(--surface); border:2px solid var(--accent); border-radius:12px; padding:8px; box-shadow:0 8px 20px rgba(0,0,0,.2); z-index:998; }

        /* ── Alpine / misc ── */
        [x-cloak] { display:none !important; }

        /* ── Voice mic listening animation ── */
        .listening { color:#ff4444 !important; animation:pulseMic 1.5s infinite; }
        @keyframes pulseMic { 0%{transform:translateY(-50%) scale(1)} 50%{transform:translateY(-50%) scale(1.2)} 100%{transform:translateY(-50%) scale(1)} }

        /* ── Modal ── */
        .modal { display:none; }
        .modal.active { display:flex; animation:fadeIn .3s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes slideUpModal { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

        /* ── Filter panel ── */
        .filter-panel { display:none; }
        .filter-panel.active { display:block; animation:slideDown .3s ease; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

        /* ── Chatbot loading dots ── */
        .dot { animation:bounceDot 1.4s infinite ease-in-out both; }
        .dot:nth-child(1){animation-delay:-.32s;}
        .dot:nth-child(2){animation-delay:-.16s;}
        @keyframes bounceDot { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

        /* ── Banner icon pulse ── */
        @keyframes pulse2 { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .animate-pulse2 { animation:pulse2 2s ease-in-out infinite; }

        /* ── Pre-wrap ── */
        .pre-wrap { white-space:pre-wrap; }
    </style>
</head>

<body id="appBody" class="min-h-screen p-5">

    <!-- ══════════ HEADER ══════════ -->
    <header class="flex justify-between items-center flex-wrap gap-5 mb-10 pb-5" style="border-bottom:2px solid var(--border);">

        <!-- Logo -->
        <div class="notranslate flex items-center px-5 py-3 rounded-2xl gap-3 cursor-pointer border transition-all duration-300 hover:-translate-y-0.5 hover:shadow-[0_8px_20px_rgba(159,232,112,.2)]"
             style="background:var(--surface); border-color:var(--border);"
             onclick="showCategory('all-announcement')" translate="no">
            <img src="CCSICTLOGOCROP.png" alt="Logo" class="w-12 h-12 rounded-xl transition-transform duration-300 hover:rotate-6 hover:scale-105">
            <span class="font-bold text-xl tracking-tight" style="color:var(--text);">
                CentraNounceIT
                <span class="bg-gradient-to-br from-[#9FE870] to-[#7acc50] text-black px-3 py-1.5 rounded-[10px] ml-1 shadow-[0_4px_12px_rgba(159,232,112,.3)] font-bold">Hub</span>
            </span>
        </div>

        <!-- Nav -->
        <nav class="flex gap-5">
            <a href="teststartuppage.html"
               class="no-underline font-medium flex items-center gap-2 px-4 py-2.5 rounded-xl text-[.95rem] transition-all duration-300 hover:-translate-y-0.5"
               style="color:var(--text-muted);"
               onmouseover="this.style.color='var(--accent)';this.style.background='var(--hover)';"
               onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent';">
                <i class="fas fa-arrow-left notranslate text-lg"></i> Back
            </a>
            <a href="student_Calendar.html"
               class="no-underline font-medium flex items-center gap-2 px-4 py-2.5 rounded-xl text-[.95rem] transition-all duration-300 hover:-translate-y-0.5"
               style="color:var(--text-muted);"
               onmouseover="this.style.color='var(--accent)';this.style.background='var(--hover)';"
               onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent';">
                <i class="fas fa-calendar notranslate text-lg"></i> Calendar
            </a>
        </nav>

        <!-- Actions -->
        <div class="flex items-center gap-4 flex-wrap">
            <!-- Theme toggle -->
            <button onclick="toggleTheme()" id="theme-toggle-btn"
                class="notranslate px-4 py-2.5 rounded-xl cursor-pointer text-base font-medium flex items-center gap-2 transition-all duration-300 border hover:-translate-y-0.5"
                style="background:var(--surface); color:var(--text); border-color:var(--border);"
                translate="no">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>

            <!-- Search -->
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none text-lg" style="color:var(--text-muted);"></i>
                <input type="text" id="searchInput" placeholder="Search announcements..."
                    oninput="searchAnnouncements()"
                    class="border py-3 pl-11 pr-20 rounded-xl w-[280px] outline-none text-[.95rem] transition-all duration-300 focus:w-[320px] focus:shadow-[0_0_0_4px_rgba(159,232,112,.2)]"
                    style="background:var(--card); color:var(--text); border-color:var(--border);"
                    onfocus="this.style.borderColor='var(--accent)';this.style.background='var(--surface)';"
                    onblur="this.style.borderColor='var(--border)';this.style.background='var(--card)';">
                <i class="fas fa-times absolute right-12 top-1/2 -translate-y-1/2 cursor-pointer hidden text-lg transition-all duration-300 hover:scale-125"
                   id="clearSearch" onclick="clearSearch()" style="color:var(--text-muted);"></i>
                <i class="fas fa-microphone absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-lg transition-all duration-300 hover:scale-125"
                   id="voiceSearchBtn" onclick="startVoiceSearch()" title="Search by Voice" style="color:var(--text-muted);"></i>
            </div>
        </div>
    </header>

    <!-- ══════════ MAIN CONTENT ══════════ -->
    <main id="main-content" class="all-announcement">

        <!-- Banner -->
        <div class="news-banner flex items-center gap-4 px-8 py-5 rounded-2xl mb-8 shadow-[0_4px_20px_rgba(0,0,0,.1)] transition-all duration-300">
            <i class="fas fa-bullhorn text-4xl animate-pulse2"></i>
            <h1 id="page-title" class="text-3xl font-bold tracking-tight">All Announcements</h1>
            <span id="searchBadge"
                  class="hidden inline-block bg-gradient-to-br from-[#9FE870] to-[#7acc50] text-black px-[18px] py-2 rounded-2xl text-[.85rem] ml-4 font-semibold shadow-[0_4px_12px_rgba(159,232,112,.3)]"></span>
        </div>

        <!-- Filter Bar -->
        <div class="flex justify-between items-center border px-6 py-4 rounded-2xl mb-8 shadow-sm flex-wrap gap-3 transition-colors duration-300" style="background:var(--surface); border-color:var(--border);">
            <div class="flex items-center gap-3 flex-wrap">
                <a href="#" class="filter-link px-4 py-2 rounded-[10px] text-[.9rem] font-semibold no-underline transition-all duration-200 hover:-translate-y-0.5 active-filter bg-gradient-to-br from-[#9FE870] to-[#7acc50] text-black shadow-[0_4px_12px_rgba(159,232,112,.3)]"
                   data-category="all-announcement" onclick="event.preventDefault();showCategory('all-announcement')">All Announcement</a>
                <a href="#" class="filter-link px-4 py-2 rounded-[10px] text-[.9rem] font-medium no-underline transition-all duration-200 hover:-translate-y-0.5" style="color:var(--text-muted);"
                   data-category="Emergency" onclick="event.preventDefault();showCategory('Emergency')">Emergency</a>
                <a href="#" class="filter-link px-4 py-2 rounded-[10px] text-[.9rem] font-medium no-underline transition-all duration-200 hover:-translate-y-0.5" style="color:var(--text-muted);"
                   data-category="Deadline" onclick="event.preventDefault();showCategory('Deadline')">Deadline</a>
                <a href="#" class="filter-link px-4 py-2 rounded-[10px] text-[.9rem] font-medium no-underline transition-all duration-200 hover:-translate-y-0.5" style="color:var(--text-muted);"
                   data-category="Memo" onclick="event.preventDefault();showCategory('Memo')">Memo</a>
                <a href="#" class="filter-link px-4 py-2 rounded-[10px] text-[.9rem] font-medium no-underline transition-all duration-200 hover:-translate-y-0.5" style="color:var(--text-muted);"
                   data-category="Notices" onclick="event.preventDefault();showCategory('Notices')">Notices</a>
            </div>
            <div class="flex items-center gap-2 cursor-pointer text-[.95rem] px-4 py-2 rounded-[10px] transition-all duration-300"
                 style="color:var(--text-muted);"
                 onmouseover="this.style.color='var(--accent)';this.style.background='var(--hover)';"
                 onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent';"
                 onclick="toggleFilterPanel()">
                <i class="fas fa-sliders-h notranslate text-lg"></i>
                <span class="font-medium">Filters</span>
            </div>
        </div>

        <!-- Filter Panel -->
        <div class="filter-panel border rounded-2xl p-6 mb-8 transition-colors duration-300" id="filterPanel" style="background:var(--surface); border-color:var(--border);">
            <div class="mb-5">
                <div class="text-xs font-bold uppercase tracking-wide mb-3" style="color:var(--text-muted);">SORT BY DATE POSTED</div>
                <div class="flex flex-wrap gap-2">
                    <button class="filter-option active px-4 py-2 rounded-[10px] border text-[.85rem] font-semibold cursor-pointer bg-gradient-to-br from-[#9FE870] to-[#7acc50] text-black border-[#9FE870] shadow-[0_4px_12px_rgba(159,232,112,.3)]"
                            data-sort="posted-newest" onclick="setSortOrder('posted-newest')">Newest to Oldest</button>
                    <button class="filter-option px-4 py-2 rounded-[10px] border text-[.85rem] font-medium cursor-pointer transition-all duration-300"
                            style="color:var(--text-muted); border-color:var(--border); background:var(--card);"
                            data-sort="posted-oldest" onclick="setSortOrder('posted-oldest')">Oldest to Newest</button>
                </div>
            </div>
            <div class="mb-5">
                <div class="text-xs font-bold uppercase tracking-wide mb-3" style="color:var(--text-muted);">SORT BY SCHEDULED DATE</div>
                <div class="flex flex-wrap gap-2">
                    <button class="filter-option px-4 py-2 rounded-[10px] border text-[.85rem] font-medium cursor-pointer transition-all duration-300"
                            style="color:var(--text-muted); border-color:var(--border); background:var(--card);"
                            data-sort="scheduled-newest" onclick="setSortOrder('scheduled-newest')">Newest to Oldest</button>
                    <button class="filter-option px-4 py-2 rounded-[10px] border text-[.85rem] font-medium cursor-pointer transition-all duration-300"
                            style="color:var(--text-muted); border-color:var(--border); background:var(--card);"
                            data-sort="scheduled-oldest" onclick="setSortOrder('scheduled-oldest')">Oldest to Newest</button>
                </div>
            </div>
            <div>
                <div class="text-xs font-bold uppercase tracking-wide mb-3" style="color:var(--text-muted);">SORT BY TARGET AUDIENCE</div>
                <div class="flex flex-wrap gap-2">
                    <button class="filter-option px-4 py-2 rounded-[10px] border text-[.85rem] font-medium cursor-pointer transition-all duration-300"
                            style="color:var(--text-muted); border-color:var(--border); background:var(--card);"
                            data-sort="audience-all" onclick="setSortOrder('audience-all')">All</button>
                    <button class="filter-option px-4 py-2 rounded-[10px] border text-[.85rem] font-medium cursor-pointer transition-all duration-300"
                            style="color:var(--text-muted); border-color:var(--border); background:var(--card);"
                            data-sort="audience-students" onclick="setSortOrder('audience-students')">Students</button>
                    <button class="filter-option px-4 py-2 rounded-[10px] border text-[.85rem] font-medium cursor-pointer transition-all duration-300"
                            style="color:var(--text-muted); border-color:var(--border); background:var(--card);"
                            data-sort="audience-faculty" onclick="setSortOrder('audience-faculty')">Faculty</button>
                </div>
            </div>
        </div>

        <!-- News Grid -->
        <div class="grid grid-cols-[repeat(auto-fit,minmax(340px,1fr))] gap-6" id="newsGrid">
            <div class="text-center py-16 text-lg col-span-full" style="color:var(--text-muted);">📡 Loading announcements...</div>
        </div>

        <!-- Pagination -->
        <div class="hidden flex justify-center items-center gap-3 mt-12 mb-8 flex-wrap" id="pagination-container">
            <button class="px-4 py-2.5 rounded-[10px] border font-semibold text-[.9rem] cursor-pointer transition-all duration-300 min-w-[44px] disabled:opacity-30 disabled:cursor-not-allowed"
                    style="background:var(--surface); color:var(--text); border-color:var(--border);"
                    id="prev-btn" onclick="previousPage()"><i class="fas fa-chevron-left"></i></button>
            <div id="page-numbers" class="flex gap-3 items-center"></div>
            <button class="px-4 py-2.5 rounded-[10px] border font-semibold text-[.9rem] cursor-pointer transition-all duration-300 min-w-[44px] disabled:opacity-30 disabled:cursor-not-allowed"
                    style="background:var(--surface); color:var(--text); border-color:var(--border);"
                    id="next-btn" onclick="nextPage()"><i class="fas fa-chevron-right"></i></button>
        </div>
    </main>

    <!-- ══════════ VIEW MODAL ══════════ -->
    <div id="viewModal" class="modal fixed z-[1000] inset-0 backdrop-blur-[8px] items-center justify-center overflow-y-auto" style="background:rgba(0,0,0,.75);">
        <div class="border border-[#9FE870] p-9 rounded-[20px] w-[90%] max-w-[720px] max-h-[90vh] overflow-y-auto m-5 shadow-[0_20px_60px_rgba(159,232,112,.3)] transition-colors duration-300"
             style="background:var(--surface); animation:slideUpModal .3s ease;">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-[1.8rem] font-bold tracking-tight" style="color:var(--text);">Announcement Details</h2>
                <span onclick="closeViewModal()"
                      class="text-4xl cursor-pointer w-10 h-10 flex items-center justify-center rounded-full transition-all duration-300 hover:rotate-90 leading-none"
                      style="color:var(--text-muted);"
                      onmouseover="this.style.color='var(--accent)';" onmouseout="this.style.color='var(--text-muted)';">&times;</span>
            </div>
            <div id="viewModalBody" class="pt-2.5 leading-[1.7]" style="color:var(--text);">
                <p>Loading details...</p>
            </div>
        </div>
    </div>

    <!-- ══════════ CHATBOT (Alpine.js) — bottom-[160px] right-[30px] ══════════ -->
    <div x-data="initChatbot()" x-cloak>
        <!-- Toggle button -->
        <button @click="isOpen = !isOpen"
            class="fixed bottom-[160px] right-[30px] w-[50px] h-[50px] rounded-full flex items-center justify-center text-black cursor-pointer z-[999] border-2 text-xl transition-all duration-300 hover:scale-110 active:scale-95"
            style="background:linear-gradient(135deg,#9FE870,#8AD95E); border-color:#9FE870; box-shadow:0 4px 12px rgba(159,232,112,.4);"
            aria-label="Toggle chatbot">
            <i x-show="!isOpen" class="fa-solid fa-robot"></i>
            <i x-show="isOpen"  class="fa-solid fa-xmark"></i>
        </button>

        <!-- Chatbot window -->
        <div x-show="isOpen"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-90 translate-y-5"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 scale-100 translate-y-0"
             x-transition:leave-end="opacity-0 scale-90 translate-y-5"
             class="fixed bottom-[240px] right-[30px] w-[90vw] max-w-[400px] h-[560px] max-h-[70vh] rounded-3xl flex flex-col overflow-hidden z-[998] border transition-colors duration-300"
             style="background:var(--bg); border-color:var(--border); box-shadow:0 20px 60px rgba(0,0,0,.5);">

            <!-- Header -->
            <div class="px-4 py-3 border-b flex items-center justify-between gap-3 transition-colors duration-300"
                 style="background:var(--surface); border-color:var(--border);">
                <div>
                    <h2 class="font-bold text-sm tracking-wide" style="color:var(--text);">Chatbot</h2>
                    <p class="text-[11px] font-medium" style="color:var(--accent);">Your Campus Assistant</p>
                </div>
                <button @click="isOpen = false" class="hover:opacity-70 transition-colors w-6 h-6 flex items-center justify-center" style="color:var(--text-muted);">
                    <i class="fa-solid fa-minus text-sm"></i>
                </button>
            </div>

            <!-- Messages -->
            <div id="chatbot-messages-container"
                 class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 transition-colors duration-300"
                 style="background:var(--bg);">
                <template x-for="(msg, index) in messages" :key="index">
                    <div :style="msg.role === 'user'
                        ? 'background:linear-gradient(135deg,#9FE870,#8AD95E);color:#000;border:1px solid #9FE870;border-radius:16px 16px 4px 16px;margin-left:auto;max-width:85%;padding:12px;font-size:.875rem;line-height:1.5;'
                        : 'background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:16px 16px 16px 4px;margin-right:auto;max-width:85%;padding:12px;font-size:.875rem;line-height:1.5;'">
                        <p class="whitespace-pre-wrap" x-text="msg.content"></p>
                    </div>
                </template>

                <!-- Loading dots -->
                <div x-show="isLoading"
                     class="flex gap-1 p-3 border self-start"
                     style="border-radius:16px 16px 16px 4px; background:var(--card); border-color:var(--border);">
                    <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
                    <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
                    <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
                </div>
            </div>

            <!-- Footer -->
            <div class="p-4 border-t transition-colors duration-300" style="background:var(--surface); border-color:var(--border);">
                <form @submit.prevent="sendMessage()" class="flex gap-2 items-center">
                    <input type="text" x-model="userInput"
                        placeholder="Ask about announcements, events..."
                        class="flex-1 px-4 py-2.5 rounded-xl border text-[.875rem] outline-none transition-all duration-300"
                        style="background:var(--card); border-color:var(--border); color:var(--text);"
                        onfocus="this.style.borderColor='var(--accent)';"
                        onblur="this.style.borderColor='var(--border)';">
                    <button type="submit" :disabled="!userInput.trim() || isLoading"
                        class="w-10 h-10 rounded-xl flex items-center justify-center border-none cursor-pointer transition-all hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed"
                        style="background:linear-gradient(135deg,#9FE870,#8AD95E); color:#000; box-shadow:0 4px 12px rgba(159,232,112,.3);">
                        <i class="fa-solid fa-paper-plane text-xs"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ══════════ TRANSLATE — bottom-[30px] right-[30px] ══════════ -->
    <button id="translate-toggle-btn"
        class="notranslate fixed bottom-[30px] right-[30px] z-[999] w-[50px] h-[50px] rounded-full flex items-center justify-center cursor-pointer text-xl text-black"
        style="background:var(--accent); border:2px solid var(--accent); box-shadow:0 4px 12px rgba(159,232,112,.4); transition:all .3s;"
        translate="no" aria-label="Toggle translation">
        <i class="fas fa-language"></i>
    </button>
    <div id="google_translate_element" class="notranslate translate-dropdown" translate="no" style="display:none;"></div>

    <script>
    // ════════════════════════════════════════
    // SUPABASE — from keys.js
    // ════════════════════════════════════════
    const supabaseUrl = window.API_KEYS?.SUPABASE_URL      || '';
    const supabaseKey = window.API_KEYS?.SUPABASE_ANON_KEY || '';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // ════════════════════════════════════════
    // STATE
    // ════════════════════════════════════════
    let currentCategory  = 'all-announcement';
    let allAnnouncements = [];
    let filteredAnnouncements = [];
    let currentSearchTerm = '';
    let currentPage  = 1;
    const itemsPerPage = 12;
    let currentSortOrder = 'posted-newest';

    // ════════════════════════════════════════
    // THEME
    // ════════════════════════════════════════
    function toggleTheme() {
        const body = document.getElementById('appBody');
        const icon = document.getElementById('theme-icon');
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            icon.classList.replace('fa-sun','fa-moon');
            localStorage.setItem('theme','dark');
        } else {
            body.classList.add('light-mode');
            icon.classList.replace('fa-moon','fa-sun');
            localStorage.setItem('theme','light');
        }
        displayAnnouncements(filteredAnnouncements, currentSearchTerm);
        setTimeout(applyTranslateColors, 50);
    }
    function loadTheme() {
        if (localStorage.getItem('theme') === 'light') {
            document.getElementById('appBody').classList.add('light-mode');
            document.getElementById('theme-icon').classList.replace('fa-moon','fa-sun');
        }
    }

    // ════════════════════════════════════════
    // FILTER PANEL
    // ════════════════════════════════════════
    function toggleFilterPanel() { document.getElementById('filterPanel').classList.toggle('active'); }

    function setSortOrder(order) {
        currentSortOrder = order;
        document.querySelectorAll('.filter-option[data-sort]').forEach(btn => {
            btn.className = 'filter-option px-4 py-2 rounded-[10px] border text-[.85rem] font-medium cursor-pointer transition-all duration-300';
            btn.style.color='var(--text-muted)'; btn.style.borderColor='var(--border)'; btn.style.background='var(--card)';
        });
        const active = document.querySelector(`.filter-option[data-sort="${order}"]`);
        if (active) {
            active.classList.add('bg-gradient-to-br','from-[#9FE870]','to-[#7acc50]','text-black','border-[#9FE870]','font-semibold','shadow-[0_4px_12px_rgba(159,232,112,.3)]','active');
            active.style.color=''; active.style.borderColor=''; active.style.background='';
        }
        applyFiltersAndSort(); displayAnnouncements(filteredAnnouncements, currentSearchTerm); updatePagination();
    }

    // ════════════════════════════════════════
    // FILTERS & SORT
    // ════════════════════════════════════════
    function applyFiltersAndSort() {
        if (currentSearchTerm) {
            filteredAnnouncements = allAnnouncements.filter(a => {
                const un = a.memberstest ? `${a.memberstest.firstName||''} ${a.memberstest.lastName||''}`.trim() : (a.posted_by || '');
                const fd = formatDate(a.scheduled_date).toLowerCase();
                return (
                    (a.title&&a.title.toLowerCase().includes(currentSearchTerm))||
                    (a.description&&a.description.toLowerCase().includes(currentSearchTerm))||
                    (a.summary&&a.summary.toLowerCase().includes(currentSearchTerm))||
                    (a.category&&a.category.toLowerCase().includes(currentSearchTerm))||
                    (a.target_audience&&a.target_audience.toLowerCase().includes(currentSearchTerm))||
                    (a.why&&a.why.toLowerCase().includes(currentSearchTerm))||
                    (a.location&&a.location.toLowerCase().includes(currentSearchTerm))||
                    (un&&un.toLowerCase().includes(currentSearchTerm))||
                    (fd&&fd.includes(currentSearchTerm))
                );
            });
        } else { filteredAnnouncements = [...allAnnouncements]; }
        if (currentSortOrder.startsWith('audience-')) {
            const at = currentSortOrder.replace('audience-','');
            if (at!=='all') filteredAnnouncements = filteredAnnouncements.filter(a=>(a.target_audience||'').toLowerCase().includes(at));
        }
        sortAnnouncements();
    }
    function sortAnnouncements() {
        if (!currentSortOrder.startsWith('audience-')) {
            filteredAnnouncements.sort((a,b) => {
                const dA = new Date(currentSortOrder.includes('scheduled') ? a.scheduled_date : (a.posted_at||a.created_at));
                const dB = new Date(currentSortOrder.includes('scheduled') ? b.scheduled_date : (b.posted_at||b.created_at));
                return currentSortOrder.includes('newest') ? dB-dA : dA-dB;
            });
        } else {
            filteredAnnouncements.sort((a,b)=>new Date(b.posted_at||b.created_at)-new Date(a.posted_at||a.created_at));
        }
    }

    // ════════════════════════════════════════
    // INIT
    // ════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
        loadTheme();
        loadAnnouncements();
        initTranslationToggle();
    });

    // ════════════════════════════════════════
    // LOAD ANNOUNCEMENTS
    // ════════════════════════════════════════
    async function loadAnnouncements(category='all-announcement', preservePage=false) {
        try {
            let q = supabaseClient.from('announcementstest').select(`*, memberstest!posted_by_member_fkey ("firstName", "lastName", avatar_url)`).eq('archived',false).order('scheduled_date',{ascending:false});
            if (category!=='all-announcement') q=q.ilike('category',category);
            const{data,error}=await q; if(error)throw error;
            allAnnouncements=data||[];
            if(!preservePage)currentPage=1;
            applyFiltersAndSort(); displayAnnouncements(filteredAnnouncements,currentSearchTerm); updatePagination();
        }catch(error){
            document.getElementById('newsGrid').innerHTML=`<div class="text-center py-16 text-red-500 col-span-full"><i class="fas fa-exclamation-triangle text-5xl mb-4 block"></i><h3 class="text-xl font-bold">Error Loading</h3><p class="mt-2 text-sm">${error.message}</p></div>`;
        }
    }

    // ════════════════════════════════════════
    // DISPLAY ANNOUNCEMENTS
    // ════════════════════════════════════════
    function displayAnnouncements(announcements, searchTerm='') {
        const grid=document.getElementById('newsGrid');
        if(!announcements.length){
            grid.innerHTML=searchTerm
                ?`<div class="text-center py-16 text-lg col-span-full" style="color:var(--text-muted);">🔍 No results for "${escapeHtml(searchTerm)}"<br><br><button onclick="clearSearch()" class="mt-4 px-6 py-3 rounded-xl font-bold text-black border-none cursor-pointer" style="background:linear-gradient(135deg,#9FE870,#7acc50);">Clear Search</button></div>`
                :`<div class="text-center py-16 text-lg col-span-full" style="color:var(--text-muted);">📭 No announcements found</div>`;
            document.getElementById('pagination-container').style.display='none';
            return;
        }
        const start=(currentPage-1)*itemsPerPage;
        const paged=announcements.slice(start,start+itemsPerPage);
        const badgeMap={emergency:'bg-red-600/15 text-red-500',deadline:'bg-[#9FE870]/15 text-[#9FE870]',news:'bg-indigo-400/15 text-indigo-400',memo:'bg-green-600/15 text-green-500',notices:'bg-yellow-400/15 text-yellow-400'};

        grid.innerHTML=paged.map(a=>{
            const catKey=(a.category||'news').toLowerCase();
            const badgeCls=badgeMap[catKey]||badgeMap.news;
            const un=a.memberstest ? `${a.memberstest.firstName||''} ${a.memberstest.lastName||''}`.trim() : (a.posted_by||'Unknown User');
            const ua=a.memberstest?.avatar_url||'https://cdn-icons-png.flaticon.com/512/847/847969.png';
            return `
            <div class="news-card relative border p-6 rounded-2xl flex flex-col gap-3 cursor-pointer overflow-hidden transition-all duration-300 hover:-translate-y-1.5 hover:border-[#9FE870] hover:shadow-[0_12px_30px_rgba(159,232,112,.2)]"
                 style="background:var(--surface); border-color:var(--border);"
                 onclick="openViewModal(${a.id})">
                <span class="self-start px-3.5 py-1.5 rounded-[10px] text-xs font-bold uppercase tracking-wide ${badgeCls}">${escapeHtml(a.category)}</span>
                <div>
                    <p class="text-sm mb-2 flex items-center gap-1.5 font-medium" style="color:var(--text-muted);">
                        <i class="fas fa-calendar"></i> Posted at: ${formatDate(a.posted_at||a.created_at)}
                    </p>
                    <p class="text-sm mb-2 flex items-center gap-1.5 font-medium" style="color:var(--text-muted);">
                        <i class="fas fa-calendar"></i> Date Scheduled: ${formatDate(a.scheduled_date)}
                    </p>
                    <h3 class="text-[1.15rem] font-bold mb-2.5 tracking-tight leading-[1.4] transition-colors duration-300 hover:text-[#9FE870]" style="color:var(--text);">
                        ${highlightText(escapeHtml(a.title),searchTerm)}
                    </h3>
                    <p class="text-[.9rem] leading-[1.6]" style="color:var(--text-muted);">
                        ${highlightText(escapeHtml(a.summary||truncateText(a.description,120))||'No description provided',searchTerm)}
                    </p>
                    <div class="flex items-center gap-3 mt-3.5 pt-3.5 text-sm" style="border-top:1px solid var(--border); color:var(--text-muted);">
                        <img src="${escapeHtml(ua)}" alt="${escapeHtml(un)}"
                             class="w-9 h-9 rounded-full object-cover border-2 border-[#9FE870] transition-transform duration-300 hover:scale-110"
                             onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
                        <span>Posted by <strong>${highlightText(escapeHtml(un),searchTerm)}</strong></span>
                    </div>
                </div>
                <div class="mt-auto pt-3 flex justify-between items-center" style="border-top:1px solid var(--border);">
                    ${a.target_audience?`<span class="text-sm flex items-center gap-1.5 font-medium" style="color:var(--text-muted);"><i class="fas fa-users"></i>${highlightText(escapeHtml(a.target_audience),searchTerm)}</span>`:'<span></span>'}
                    <span class="text-sm font-semibold flex items-center gap-1.5 transition-all duration-300" style="color:var(--accent);">View Details <i class="fas fa-arrow-right"></i></span>
                </div>
            </div>`;
        }).join('');
    }

    // ════════════════════════════════════════
    // PAGINATION
    // ════════════════════════════════════════
    function updatePagination() {
        const total=Math.ceil(filteredAnnouncements.length/itemsPerPage);
        const pc=document.getElementById('pagination-container');
        if(total<=1){pc.style.display='none';return;}pc.style.display='flex';
        document.getElementById('prev-btn').disabled=currentPage===1;
        document.getElementById('next-btn').disabled=currentPage===total;
        const base=`style="background:var(--surface);color:var(--text);border:1px solid var(--border);"`;
        const act=`style="background:linear-gradient(135deg,#9FE870,#7acc50);color:#000;border-color:#9FE870;box-shadow:0 4px 12px rgba(159,232,112,.3);"`;
        let html='';
        if(currentPage>2){html+=`<button class="px-4 py-2.5 rounded-[10px] font-semibold text-[.9rem] cursor-pointer min-w-[44px]" ${base} onclick="goToPage(1)">1</button>`;if(currentPage>3)html+=`<span style="color:var(--text-muted);" class="text-[.9rem] mx-2">...</span>`;}
        for(let i=Math.max(1,currentPage-1);i<=Math.min(total,currentPage+1);i++) html+=`<button class="px-4 py-2.5 rounded-[10px] font-semibold text-[.9rem] cursor-pointer min-w-[44px]" ${i===currentPage?act:base} onclick="goToPage(${i})">${i}</button>`;
        if(currentPage<total-1){if(currentPage<total-2)html+=`<span style="color:var(--text-muted);" class="text-[.9rem] mx-2">...</span>`;html+=`<button class="px-4 py-2.5 rounded-[10px] font-semibold text-[.9rem] cursor-pointer min-w-[44px]" ${base} onclick="goToPage(${total})">${total}</button>`;}
        document.getElementById('page-numbers').innerHTML=html;
    }
    function goToPage(p){currentPage=p;displayAnnouncements(filteredAnnouncements,currentSearchTerm);updatePagination();window.scrollTo({top:0,behavior:'smooth'});}
    function previousPage(){if(currentPage>1)goToPage(currentPage-1);}
    function nextPage(){if(currentPage<Math.ceil(filteredAnnouncements.length/itemsPerPage))goToPage(currentPage+1);}

    // ════════════════════════════════════════
    // MODAL
    // ════════════════════════════════════════
    function openViewModal(id) {
        const a=allAnnouncements.find(x=>x.id===id); if(!a)return;
        const st=document.getElementById('searchInput').value.toLowerCase().trim();
        document.getElementById('modalTitle').innerHTML=highlightText(escapeHtml(a.title),st);
        document.getElementById('viewModalBody').innerHTML=`
            <p class="text-sm font-medium mb-3 pl-2.5 flex items-center" style="color:var(--text-muted);border-left:3px solid var(--accent);">
                <i class="fas fa-file-export w-7 text-center mr-2" style="color:var(--accent);"></i><strong class="mr-2">Date posted:</strong>${formatDate(a.posted_at||a.created_at)}</p>
            <p class="text-sm font-medium mb-3 pl-2.5 flex items-center" style="color:var(--text-muted);border-left:3px solid var(--accent);">
                <i class="fas fa-calendar-check w-7 text-center mr-2" style="color:var(--accent);"></i><strong class="mr-2">Date scheduled:</strong>${formatDate(a.scheduled_date)}</p>
            <p class="text-sm font-medium mb-3 pl-2.5 flex items-center" style="color:var(--text-muted);border-left:3px solid var(--accent);">
                <i class="fas fa-question-circle w-7 text-center mr-2" style="color:var(--accent);"></i><strong class="mr-2">Why:</strong>${highlightText(escapeHtml(a.why)||'N/A',st)}</p>
            <p class="text-sm font-medium mb-5 pl-2.5 flex items-center" style="color:var(--text-muted);border-left:3px solid var(--accent);">
                <i class="fas fa-map-marker-alt w-7 text-center mr-2" style="color:var(--accent);"></i><strong class="mr-2">Location:</strong>${highlightText(escapeHtml(a.location)||'N/A',st)}</p>
            <p class="text-[.95rem] pre-wrap mt-5 leading-[1.7] pl-2.5" style="color:var(--text);border-left:3px solid var(--border);">
                <strong class="inline-flex items-center mr-2 mb-2" style="color:var(--text-muted);">
                    <i class="fas fa-align-left mr-2" style="color:var(--accent);"></i> Full Content:
                </strong>
                ${highlightText(escapeHtml(a.description).replace(/\n/g,'<br>')||'No description provided',st)}
            </p>`;
        document.getElementById('viewModal').classList.add('active');
    }
    function closeViewModal() { document.getElementById('viewModal').classList.remove('active'); }

    // ════════════════════════════════════════
    // SEARCH
    // ════════════════════════════════════════
    function searchAnnouncements(preservePage=false) {
        const st=document.getElementById('searchInput').value.toLowerCase().trim();
        const cb=document.getElementById('clearSearch'), badge=document.getElementById('searchBadge');
        currentSearchTerm=st;
        if(st){cb.classList.remove('hidden');cb.classList.add('block');}else{cb.classList.add('hidden');cb.classList.remove('block');}
        if(!st){badge.classList.add('hidden');if(!preservePage)currentPage=1;applyFiltersAndSort();displayAnnouncements(filteredAnnouncements);updatePagination();return;}
        if(!preservePage)currentPage=1;
        applyFiltersAndSort();
        if(filteredAnnouncements.length>0){badge.textContent=`${filteredAnnouncements.length} result${filteredAnnouncements.length!==1?'s':''}`;badge.classList.remove('hidden');}else badge.classList.add('hidden');
        displayAnnouncements(filteredAnnouncements,st); updatePagination();
    }
    function clearSearch(){
        document.getElementById('searchInput').value='';
        document.getElementById('clearSearch').classList.add('hidden');
        document.getElementById('searchBadge').classList.add('hidden');
        currentSearchTerm='';currentPage=1;
        applyFiltersAndSort();displayAnnouncements(filteredAnnouncements);updatePagination();
    }

    // ════════════════════════════════════════
    // VOICE SEARCH
    // ════════════════════════════════════════
    function startVoiceSearch(){
        const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
        if(!SR){alert("Your browser doesn't support voice search.");return;}
        const r=new SR(),mic=document.getElementById('voiceSearchBtn'),inp=document.getElementById('searchInput');
        r.continuous=false;r.interimResults=false;r.lang='en-US';
        r.onstart=()=>{mic.classList.add('listening');inp.placeholder='Listening...';};
        r.onresult=e=>{inp.value=e.results[0][0].transcript.replace(/\.$/,'');searchAnnouncements();};
        r.onerror=e=>{mic.classList.remove('listening');inp.placeholder='Search announcements...';if(e.error==='not-allowed')alert('Microphone access denied.');else if(e.error==='no-speech')alert('No speech detected.');};
        r.onend=()=>{mic.classList.remove('listening');inp.placeholder='Search announcements...';};
        try{r.start();}catch(err){alert('Voice search error: '+err.message);}
    }

    // ════════════════════════════════════════
    // CATEGORY
    // ════════════════════════════════════════
    async function showCategory(categoryId) {
        currentCategory=categoryId;currentPage=1;
        document.getElementById('main-content').className=categoryId.toLowerCase();
        const cfg={'all-announcement':{title:'All Announcements',icon:'fa-bullhorn'},'Emergency':{title:'Emergency Alerts',icon:'fa-exclamation-triangle'},'Deadline':{title:'Deadlines',icon:'fa-calendar-times'},'Memo':{title:'Memos',icon:'fa-clipboard-list'},'Notices':{title:'Notices',icon:'fa-info-circle'},'News':{title:'News Updates',icon:'fa-newspaper'}};
        const c=cfg[categoryId]||cfg['all-announcement'];
        document.getElementById('page-title').textContent=c.title;
        document.querySelector('.news-banner i').className=`fas ${c.icon} text-4xl animate-pulse2`;

        document.querySelectorAll('.filter-link').forEach(l=>{
            l.className='filter-link px-4 py-2 rounded-[10px] text-[.9rem] font-medium no-underline transition-all duration-200 hover:-translate-y-0.5';
            l.style.color='var(--text-muted)';
        });
        document.querySelectorAll(`.filter-link[data-category="${categoryId}"]`).forEach(l=>{
            l.className='filter-link px-4 py-2 rounded-[10px] text-[.9rem] font-semibold no-underline active-filter bg-gradient-to-br from-[#9FE870] to-[#7acc50] text-black shadow-[0_4px_12px_rgba(159,232,112,.3)]';
            l.style.color='';
        });
        clearSearch(); await loadAnnouncements(categoryId);
    }

    // ════════════════════════════════════════
    // GOOGLE TRANSLATE
    // ════════════════════════════════════════
    function getThemeColors(){
        const isLight=document.getElementById('appBody').classList.contains('light-mode');
        return{text:isLight?'#163300':'#ffffff',bg:isLight?'#e8f5e0':'#1a1a1a',border:isLight?'#c9e5ba':'#2d5514'};
    }
    function applyTranslateColors(){
        const dd=document.getElementById('google_translate_element');if(!dd)return;
        const{text,bg,border}=getThemeColors();
        const combo=dd.querySelector('.goog-te-combo,select');
        if(combo){combo.style.setProperty('color',text,'important');combo.style.setProperty('background-color',bg,'important');combo.style.setProperty('border',`1px solid ${border}`,'important');combo.style.setProperty('border-radius','8px','important');combo.style.setProperty('padding','6px 10px','important');combo.style.setProperty('font-weight','600','important');combo.style.setProperty('font-family','Inter,sans-serif','important');combo.style.setProperty('font-size','.85rem','important');combo.style.setProperty('outline','none','important');combo.style.setProperty('cursor','pointer','important');combo.querySelectorAll('option').forEach(o=>{o.style.setProperty('color',text,'important');o.style.setProperty('background-color',bg,'important');});}
        dd.querySelectorAll('span,a,.goog-te-menu-value,.goog-te-menu-value span').forEach(el=>el.style.setProperty('color',text,'important'));
    }
    function suppressTranslateBanner(){
        function hide(){document.querySelectorAll('.goog-te-banner-frame,.skiptranslate > iframe,#goog-gt-tt,.goog-te-balloon-frame').forEach(el=>{el.style.setProperty('display','none','important');el.style.setProperty('height','0','important');el.style.setProperty('visibility','hidden','important');});if(document.body.style.top&&document.body.style.top!=='0px'){document.body.style.setProperty('top','0','important');document.body.style.setProperty('margin-top','0','important');}}
        new MutationObserver(hide).observe(document.body,{attributes:true,attributeFilter:['style','class'],childList:true});
        new MutationObserver(hide).observe(document.head,{childList:true});
        hide();
    }
    function initTranslationToggle(){
        const btn=document.getElementById('translate-toggle-btn'),dd=document.getElementById('google_translate_element');
        if(!btn||!dd)return;
        btn.addEventListener('click',e=>{e.stopPropagation();const vis=dd.style.display==='block';dd.style.display=vis?'none':'block';if(!vis)applyTranslateColors();});
        document.addEventListener('click',e=>{if(!e.target.closest('#translate-toggle-btn')&&!e.target.closest('#google_translate_element'))dd.style.display='none';});
        document.getElementById('theme-toggle-btn').addEventListener('click',()=>setTimeout(applyTranslateColors,50));
        new MutationObserver(applyTranslateColors).observe(dd,{childList:true,subtree:true,attributes:true,attributeFilter:['style']});
        let tries=0;const poll=setInterval(()=>{applyTranslateColors();if(++tries>=20)clearInterval(poll);},500);
        suppressTranslateBanner();
    }

    // ════════════════════════════════════════
    // HELPERS
    // ════════════════════════════════════════
    function formatDate(ds){if(!ds)return'No date';return new Date(ds).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});}
    function truncateText(t,max){if(!t)return'';return t.length<=max?t:t.substring(0,max)+'...';}
    function escapeHtml(t){if(t==null)return'';return String(t).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
    function highlightText(t,st){if(!st||!t)return t;return t.replace(new RegExp(`(${escapeRegex(st)})`,'gi'),'<span class="highlight-text">$1</span>');}
    function escapeRegex(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

    document.addEventListener('keydown',e=>{
        if(e.key==='Escape'){if(document.querySelector('.modal.active'))closeViewModal();else if(currentSearchTerm)clearSearch();}
        if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}
    });

    // ════════════════════════════════════════
    // CHATBOT — Alpine.js x-data (replaces all vanilla JS chatbot code)
    // ════════════════════════════════════════
    function initChatbot() {
        return {
            isOpen: false,
            userInput: '',
            isLoading: false,
            sessionId: 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2,9),
            messages: [{
                role: 'assistant',
                content: 'Hi! Welcome to CentraNounceIT Hub. I can help you with announcements, events, deadlines, and campus information. What would you like to know?'
            }],

            async sendMessage() {
                if (!this.userInput.trim()) return;
                this.messages.push({ role:'user', content:this.userInput });
                const input = this.userInput;
                this.userInput = '';
                this.isLoading = true;
                this.scrollToBottom();

                let replyAppended = false;
                try {
                    const [annCtx, sysCtx] = await Promise.all([
                        this.fetchRelevantAnnouncements(input),
                        this.fetchSystemInfo(input)
                    ]);

                    const sysMsg = {
                        role: 'system',
                        content: `You are the CentraNounceIT Hub Assistant, helping students find campus announcements and information.

ANNOUNCEMENT COLUMNS: id, created_at, title, description, scheduled_date, target_audience, category, posted_by, posted_by_user_id, archived, archived_at, why, location, posted_at, summary.

DATE FIELDS:
- "Posted At" = when the announcement was published (posted_at)
- "Scheduled Date" = the event/deadline date (scheduled_date)
When asked "when was it posted?", use Posted At. When asked "when is the event?", use Scheduled Date.

IMPORTANT ORDERING: Announcements below are sorted by Posted At date, NEWEST FIRST. So [1] is the MOST RECENT announcement.

CURRENT ANNOUNCEMENTS DATABASE:
${annCtx}

SYSTEM INFORMATION (Platform Rules, FAQs, and How-To Guides):
${sysCtx}

INSTRUCTIONS:
- Answer based ONLY on the data above. Do not invent information.
- When listing announcements, use bullet points with title, category, date, and a brief summary.
- If asked about a person, scan ALL "Posted by" fields carefully.
- Format dates readably (e.g., "January 15, 2024").
- Highlight emergency announcements and upcoming deadlines.
- Be concise, helpful, and professional.`
                    };

                    const apiKey = window.API_KEYS?.GROQ_API_KEY || '';
                    const msgs   = [sysMsg, ...this.messages.map(m=>({role:m.role,content:m.content}))];
                    // Updated model list (removed llama3-8b-8192)
                    const models  = ['llama-3.3-70b-versatile','llama-3.1-8b-instant','mixtral-8x7b-32768'];
                    let response  = null, lastError = '';

                    // Try up to 7 keys
                    for (let keyAttempt = 0; keyAttempt < 7; keyAttempt++) {
                        const apiKey = window.API_HELPERS.getGroqKey();
                        
                        for (const model of models) {
                            try {
                                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                                    method: 'POST',
                                    headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
                                    body: JSON.stringify({ model, messages:msgs, temperature:0.7, max_tokens:1024 })
                                });
                                if (res.ok) { response=res; break; }
                                lastError = await res.text();
                                if (res.status !== 429 && res.status !== 413) break;
                            } catch(fe) { lastError = fe.message; }
                        }
                        
                        if (response) break; // Success! Exit key loop
                        
                        if (lastError.includes('429') || lastError.includes('rate limit')) {
                            window.API_HELPERS.rotateGroqKey();
                        } else {
                            break; // Not a rate limit issue, stop trying
                        }
                    }

                    if (!response) {
                        const wm = lastError.match(/try again in (\d+m[\d.]+s|\d+s)/i);
                        throw new Error(wm ? `RATE_LIMITED:${wm[1]}` : `API_FAILED:${lastError}`);
                    }

                    const data  = await response.json();
                    const reply = data.choices[0].message.content;
                    this.messages.push({ role:'assistant', content:reply });
                    replyAppended = true;
                    await this.saveChatHistory(input, reply);

                } catch(err) {
                    if (!replyAppended) {
                        let msg = 'Sorry, I encountered an error. Please try again.';
                        if (err.message?.startsWith('RATE_LIMITED:'))
                            msg = `⏳ Rate limited. Please try again in ${err.message.replace('RATE_LIMITED:','')}`;
                        this.messages.push({ role:'assistant', content:msg });
                    }
                } finally {
                    this.isLoading = false;
                    this.scrollToBottom();
                }
            },

            async fetchRelevantAnnouncements(userQuery) {
                try {
                    const sf = `id,title,description,summary,category,scheduled_date,target_audience,location,created_at,posted_by,posted_at,why,memberstest!posted_by_member_fkey("firstName","lastName")`;
                    let detectedDate = this.parseDateFromQuery(userQuery);
                    let dateData = [];

                    if (detectedDate) {
                        const yr=detectedDate.getFullYear(),mn=String(detectedDate.getMonth()+1).padStart(2,'0'),dy=String(detectedDate.getDate()).padStart(2,'0');
                        const{data:dr}=await supabaseClient.from('announcementstest').select(sf).eq('archived',false).gte('posted_at',`${yr}-${mn}-${dy}T00:00:00`).lte('posted_at',`${yr}-${mn}-${dy}T23:59:59`);
                        if(dr)dateData=dr;
                    }

                    const{data:recent}=await supabaseClient.from('announcementstest').select(sf).eq('archived',false).order('posted_at',{ascending:false,nullsFirst:false}).limit(20);
                    const seen=new Set(),merged=[];
                    for(const a of [...dateData,...(recent||[])]){if(!seen.has(a.id)){seen.add(a.id);merged.push(a);}}
                    if(!merged.length)return'No announcements found.';

                    const opts={year:'numeric',month:'short',day:'numeric'};
                    const trunc=(t,m)=>t&&t.length>m?t.substring(0,m)+'...':(t||'N/A');
                    return merged.map((a,i)=>{
                        const pb=a.memberstest ? `${a.memberstest.firstName||''} ${a.memberstest.lastName||''}`.trim() : (a.posted_by||'Unknown');
                        return `[${i+1}] ${a.title}\nCategory:${a.category||'General'}\nPosted At:${a.posted_at?new Date(a.posted_at).toLocaleDateString('en-US',opts):'N/A'}\nScheduled Date:${a.scheduled_date?new Date(a.scheduled_date).toLocaleDateString('en-US',opts):'N/A'}\nAudience:${a.target_audience||'All'}\nLocation:${a.location||'N/A'}\nWhy:${a.why||'N/A'}\nDetails:${a.summary||trunc(a.description,150)}\nPosted by:${pb}\n---`;
                    }).join('\n');
                } catch { return 'Unable to fetch announcements.'; }
            },

            parseDateFromQuery(q) {
                q=q.toLowerCase();
                const months={jan:0,january:0,feb:1,february:1,mar:2,march:2,apr:3,april:3,may:4,jun:5,june:5,jul:6,july:6,aug:7,august:7,sep:8,september:8,oct:9,october:9,nov:10,november:10,dec:11,december:11};
                const m1=q.match(/\b(january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|jun|jul|aug|sep|oct|nov|dec)\s+(\d{1,2}),?\s*(\d{4})\b/);
                if(m1){const mo=months[m1[1]],d=parseInt(m1[2]),yr=parseInt(m1[3]);if(mo!==undefined&&d>=1&&d<=31)return new Date(yr,mo,d);}
                const m2=q.match(/\b(\d{4})-(\d{2})-(\d{2})\b/);
                if(m2)return new Date(parseInt(m2[1]),parseInt(m2[2])-1,parseInt(m2[3]));
                const m3=q.match(/\b(\d{1,2})\/(\d{1,2})\/(\d{4})\b/);
                if(m3)return new Date(parseInt(m3[3]),parseInt(m3[1])-1,parseInt(m3[2]));
                return null;
            },

            async fetchSystemInfo(userQuery) {
                try {
                    const{data,error}=await supabaseClient.from('system_info').select('category,topic,content');
                    if(error||!data?.length)return'No system information available.';
                    if(!userQuery)return data.slice(0,5).map(i=>`[${i.category}] ${i.topic}: ${i.content}`).join('\n---\n');
                    const qs=userQuery.toLowerCase();
                    const isTeam=qs.includes('dev')||qs.includes('team')||qs.includes('who')||qs.includes('creator')||qs.includes('made');
                    const scored=data.map(info=>{
                        let s=0;
                        const cat=(info.category||'').toLowerCase(),top=(info.topic||'').toLowerCase(),cont=(info.content||'').toLowerCase();
                        if(isTeam&&(cat.includes('team')||top.includes('developer')||cont.includes('developer')))s+=15;
                        qs.replace(/[^\w\s]/g,'').split(/\s+/).filter(w=>w.length>3).forEach(w=>{const st=w.substring(0,5);if(top.includes(st))s+=5;if(cat.includes(st))s+=3;if(cont.includes(st))s+=2;});
                        return{...info,score:s};
                    });
                    scored.sort((a,b)=>b.score-a.score);
                    return(scored[0].score>0?scored.slice(0,6):data.slice(0,5)).map(i=>`[${i.category}] ${i.topic}: ${i.content}`).join('\n---\n');
                } catch { return 'Unable to fetch system information.'; }
            },

            async saveChatHistory(userMsg, reply) {
                try {
                    await supabaseClient.from('chat_history').insert([{session_id:this.sessionId,user_message:userMsg,assistant_response:reply,has_security_concern:false,created_at:new Date().toISOString()}]);
                } catch {}
            },

            scrollToBottom() {
                this.$nextTick(()=>{const c=document.getElementById('chatbot-messages-container');if(c)c.scrollTop=c.scrollHeight;});
            }
        };
    }
    </script>
